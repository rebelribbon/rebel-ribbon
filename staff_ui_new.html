<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#5c3a3d"/>
<title>Rebel Ribbon · Staff</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Lato:wght@300;400;500;700&display=swap');

/* ========================================================================
   DESIGN TOKENS — pulled directly from rebelribbon.com
   ======================================================================== */
:root {
    /* Atmospheric background — the pink wash */
    --bg-base:       #f5e6e3;
    --bg-light:      #fce4dc;
    --bg-lighter:    #fdf2ee;
    --cream:         #fdf8f3;
    --cream-soft:    #fbf3eb;

    /* Brown — the structure of the brand */
    --ink:           #3d2b2e;     /* body text, like coffee */
    --ink-soft:      #806b6e;     /* secondary text */
    --ink-faded:     #a89898;     /* tertiary, captions */
    --brown:         #5c3a3d;     /* CTA buttons, accents */
    --brown-deep:    #432a2c;     /* hover */

    /* Dusty rose — the italic accent */
    --rose:          #d4a5a5;     /* the "Sweetest Moments" pink */
    --rose-deep:     #b8847e;     /* hover, decorative */
    --rose-soft:     #ecc8c2;     /* backgrounds, badges */
    --rose-faintest: #fdf0ec;

    /* Functional colors — muted to fit the palette */
    --green:         #6b8e6f;
    --green-soft:    #e3ede4;
    --amber:         #b8895c;
    --amber-soft:    #f5e8d7;
    --red:           #a85651;
    --red-soft:      #f2dad8;
    --blue:          #6b85a8;
    --blue-soft:     #e1e8f0;

    /* Lines */
    --line:          rgba(61, 43, 46, 0.08);
    --line-strong:   rgba(61, 43, 46, 0.16);
    --line-rose:     rgba(212, 165, 165, 0.35);

    /* Type */
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Lato', -apple-system, BlinkMacSystemFont, sans-serif;

    /* Shadow — gentle, never harsh */
    --shadow-xs: 0 1px 2px rgba(61, 43, 46, 0.04);
    --shadow:    0 4px 16px -4px rgba(61, 43, 46, 0.08);
    --shadow-lg: 0 20px 50px -20px rgba(61, 43, 46, 0.18);

    /* Layout */
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
    --sidebar-w: 240px;
    --topbar-h: 64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html { overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
    background:
        radial-gradient(at 20% 0%, var(--bg-light) 0px, transparent 50%),
        radial-gradient(at 100% 100%, var(--bg-base) 0px, transparent 50%),
        var(--bg-lighter);
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
    letter-spacing: 0.005em;
}
button { font-family: inherit; cursor: pointer; }
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: var(--brown); text-decoration: none; }
a:hover { color: var(--brown-deep); }

/* Quiet scrollbars */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: rgba(61, 43, 46, 0.15); border-radius: 999px; }
::-webkit-scrollbar-track { background: transparent; }

/* ========================================================================
   TYPOGRAPHY
   ======================================================================== */
.display { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.005em; line-height: 1.15; }
.display em { font-style: italic; color: var(--rose-deep); font-weight: 400; }
h1 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.01em; line-height: 1.1; }
h2 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.005em; }
h3 { font-family: var(--font-display); font-weight: 500; letter-spacing: 0; }

/* ========================================================================
   SIGN IN
   ======================================================================== */
#signin {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
    background:
        radial-gradient(at 30% 30%, var(--bg-light) 0px, transparent 50%),
        radial-gradient(at 70% 70%, var(--rose-soft) 0px, transparent 50%),
        var(--cream);
}
.signin-card {
    width: 100%; max-width: 380px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 3rem 2.25rem 2.25rem;
    box-shadow: var(--shadow-lg);
    position: relative;
}
.signin-bow {
    position: absolute; top: -32px; left: 50%; transform: translateX(-50%);
    width: 64px; height: 64px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
}
.signin-bow img { width: 36px; height: 36px; }
.signin-title {
    font-family: var(--font-display);
    font-size: 1.75rem; font-weight: 500;
    text-align: center; margin-bottom: 0.25rem;
    color: var(--ink);
    letter-spacing: -0.01em;
}
.signin-title em { font-style: italic; color: var(--rose-deep); font-weight: 400; }
.signin-sub {
    font-size: 0.75rem; color: var(--ink-faded);
    text-align: center; margin-bottom: 2rem;
    text-transform: uppercase; letter-spacing: 0.15em;
}
.field { margin-bottom: 1.125rem; }
.field label {
    display: block;
    font-size: 0.6875rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 0.5rem;
}
.field input, .field select, .field textarea {
    width: 100%; padding: 0.75rem 1rem;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: white;
    font-size: 0.9375rem;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
}
.field input::placeholder { color: var(--ink-faded); }
.field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--brown);
    box-shadow: 0 0 0 3px rgba(92, 58, 61, 0.08);
}
.auth-msg {
    margin-top: 0.75rem;
    padding: 0.625rem 0.875rem;
    background: var(--red-soft);
    color: var(--red);
    border-radius: 8px;
    font-size: 0.8125rem;
    display: none;
}
.auth-msg.visible { display: block; }

/* ========================================================================
   APP SHELL
   ======================================================================== */
#app { display: none; min-height: 100dvh; }
#app.visible { display: block; }

.topbar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 50;
    padding-top: var(--safe-top);
    background: rgba(253, 248, 243, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--line);
}
.topbar-inner {
    display: flex; align-items: center; gap: 1rem;
    height: var(--topbar-h); padding: 0 1.25rem;
}
.menu-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--ink);
    border: none; border-radius: 10px;
    transition: background 0.15s;
    flex-shrink: 0;
}
.menu-btn:hover { background: var(--rose-faintest); }
.menu-btn:active { transform: scale(0.95); }
.menu-btn svg { width: 22px; height: 22px; stroke-width: 1.5; }

.topbar-brand {
    display: flex; align-items: center; gap: 0.75rem;
    color: inherit;
}
.topbar-brand img { width: 32px; height: 32px; }
.topbar-brand-text {
    font-family: var(--font-display);
    font-size: 1.375rem; font-weight: 500;
    color: var(--ink);
    letter-spacing: 0;
}
.topbar-brand-text em { font-style: italic; color: var(--rose-deep); font-weight: 400; }

.topbar-spacer { flex: 1; }

.topbar-user {
    display: flex; align-items: center; gap: 0.625rem;
    font-size: 0.8125rem; color: var(--ink-soft);
}
.user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--rose-soft);
    color: var(--brown);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 0.8125rem;
    border: 1px solid var(--line);
}
@media (max-width: 640px) { .topbar-user-name { display: none; } }

/* Hide menu button on desktop where sidebar is persistent */
@media (min-width: 1024px) {
    .menu-btn { display: none; }
}

/* ========================================================================
   SIDEBAR
   ======================================================================== */
#sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px; z-index: 60;
    background: var(--cream);
    padding-top: calc(var(--safe-top) + 1.25rem);
    padding-bottom: calc(var(--safe-bottom) + 1rem);
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 4px 0 24px rgba(61, 43, 46, 0.08);
    display: flex; flex-direction: column;
    overflow-y: auto;
}
#sidebar.open { transform: translateX(0); }

/* Persistent on desktop */
@media (min-width: 1024px) {
    #sidebar {
        transform: translateX(0);
        width: var(--sidebar-w);
        box-shadow: none;
        border-right: 1px solid var(--line);
        z-index: 51;
        padding-top: calc(var(--safe-top) + 1.25rem);
    }
    .sidebar-backdrop { display: none !important; }
}

.sidebar-backdrop {
    position: fixed; inset: 0; z-index: 55;
    background: rgba(61, 43, 46, 0.4);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
}
.sidebar-backdrop.visible { opacity: 1; pointer-events: auto; }

.sidebar-brand {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0 1.5rem 1.5rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 1rem;
}
.sidebar-brand img { width: 36px; height: 36px; }
.sidebar-brand-text {
    font-family: var(--font-display);
    font-size: 1.25rem; font-weight: 500;
    color: var(--ink);
}
.sidebar-brand-text em { font-style: italic; color: var(--rose-deep); font-weight: 400; }

.sidebar-section {
    padding: 0.875rem 1.5rem 0.5rem;
    font-size: 0.625rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--ink-faded);
}
.nav-item {
    display: flex; align-items: center;
    padding: 0.625rem 1.5rem;
    background: transparent; border: none;
    width: 100%; text-align: left;
    font-size: 0.9375rem; font-weight: 400;
    color: var(--ink);
    transition: background 0.12s, color 0.12s;
    border-left: 2px solid transparent;
    font-family: var(--font-body);
}
.nav-item:hover { background: var(--rose-faintest); }
.nav-item.active {
    background: var(--rose-faintest);
    border-left-color: var(--brown);
    color: var(--brown);
    font-weight: 600;
}
.nav-item .nav-count {
    margin-left: auto;
    background: var(--line);
    color: var(--ink-soft);
    font-size: 0.6875rem; font-weight: 600;
    padding: 0.0625rem 0.5rem;
    border-radius: 999px;
    min-width: 22px; text-align: center;
}
.nav-item.active .nav-count { background: var(--brown); color: var(--cream); }
.nav-item .nav-count.zero { opacity: 0; }

.sidebar-footer {
    margin-top: auto;
    padding: 1rem 1.5rem 0;
    border-top: 1px solid var(--line);
}
.sidebar-user {
    font-size: 0.75rem; color: var(--ink-soft);
    margin-bottom: 0.625rem;
    overflow: hidden; text-overflow: ellipsis;
}
.btn-signout {
    width: 100%; padding: 0.5rem;
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 0.75rem; font-weight: 500;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}
.btn-signout:hover { background: var(--brown); color: var(--cream); border-color: var(--brown); }

/* ========================================================================
   MAIN
   ======================================================================== */
main {
    padding-top: calc(var(--topbar-h) + var(--safe-top));
    padding-bottom: calc(var(--safe-bottom) + 3rem);
    min-height: 100dvh;
}
@media (min-width: 1024px) {
    main { padding-left: var(--sidebar-w); }
}
.main-inner {
    max-width: 1200px;
    padding: 2rem 1.25rem;
    margin: 0 auto;
}
@media (min-width: 768px) { .main-inner { padding: 3rem 2rem; } }
@media (min-width: 1024px) { .main-inner { padding: 3rem 3.5rem; } }

.page-header { margin-bottom: 2.5rem; }
.page-overline {
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-faded);
    margin-bottom: 0.625rem;
}
.page-title {
    font-family: var(--font-display);
    font-size: clamp(2.25rem, 5vw, 3rem);
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.1;
}
.page-title em { font-style: italic; color: var(--rose-deep); font-weight: 400; }
.page-subtitle {
    color: var(--ink-soft);
    font-size: 0.9375rem;
    margin-top: 0.875rem;
    max-width: 560px;
}

/* ========================================================================
   HEALTH BANNER — quiet, only when truly broken
   ======================================================================== */
#health-banner {
    display: none;
    margin-bottom: 1.5rem;
    padding: 0.75rem 1rem;
    background: var(--amber-soft);
    color: var(--amber);
    font-size: 0.8125rem;
    border-left: 3px solid var(--amber);
    border-radius: 4px;
    align-items: center; gap: 0.75rem;
}
#health-banner.visible { display: flex; }
#health-banner.red { background: var(--red-soft); color: var(--red); border-left-color: var(--red); }

/* ========================================================================
   SEARCH
   ======================================================================== */
.search-wrap {
    position: relative;
    max-width: 480px;
    margin-bottom: 2rem;
}
.search-wrap svg {
    position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--ink-faded);
    pointer-events: none;
}
.search-input {
    width: 100%; padding: 0.75rem 1.25rem 0.75rem 2.75rem;
    background: var(--cream);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 0.875rem;
    color: var(--ink);
    transition: all 0.15s;
}
.search-input::placeholder { color: var(--ink-faded); }
.search-input:focus {
    outline: none;
    border-color: var(--brown);
    box-shadow: 0 0 0 3px rgba(92, 58, 61, 0.06);
    background: white;
}

/* ========================================================================
   QUEUE SECTIONS — the rhythm of the work day
   ======================================================================== */
.queue-section { margin-bottom: 3rem; }
.queue-section:last-child { margin-bottom: 0; }

.queue-header {
    display: flex; align-items: baseline; gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--line);
}
.queue-title {
    font-family: var(--font-display);
    font-size: 1.375rem;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
}
.queue-title em { font-style: italic; color: var(--rose-deep); font-weight: 400; }
.queue-count {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink-faded);
    margin-left: -0.25rem;
}
.queue-description {
    font-size: 0.8125rem;
    color: var(--ink-faded);
    margin-left: auto;
    font-style: italic;
}
@media (max-width: 640px) { .queue-description { display: none; } }

.queue-empty {
    background: var(--cream);
    border: 1px dashed var(--line-strong);
    border-radius: 12px;
    padding: 3rem 1.5rem;
    text-align: center;
    color: var(--ink-faded);
    font-size: 0.9375rem;
    font-style: italic;
}

/* ========================================================================
   ORDER CARDS — the heart of the dashboard
   ======================================================================== */
.cards-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.875rem;
}
@media (min-width: 768px) { .cards-list { gap: 1rem; grid-template-columns: 1fr 1fr; } }
@media (min-width: 1300px) { .cards-list { grid-template-columns: 1fr 1fr 1fr; } }

/* Hero card — the most urgent thing */
.cards-list.hero {
    grid-template-columns: 1fr !important;
}
.cards-list.hero .order-card {
    padding: 2rem 2.25rem;
}
.cards-list.hero .order-name { font-size: 1.75rem; }
.cards-list.hero .order-next-action { font-size: 1rem; }

.order-card {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 1.5rem 1.625rem 1.25rem;
    box-shadow: var(--shadow-xs);
    transition: all 0.2s cubic-bezier(0.32, 0.72, 0, 1);
    cursor: pointer;
    display: flex; flex-direction: column;
    gap: 1rem;
    position: relative;
    text-align: left;
    width: 100%;
    border-left: 3px solid transparent;
    font-family: inherit;
}
.order-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: var(--line-rose);
}
.order-card:active { transform: scale(0.99); }
.order-card.priority { border-left-color: var(--brown); }

.order-card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 0.75rem;
}
.order-name {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.2;
}
.order-event {
    font-size: 0.6875rem;
    color: var(--rose-deep);
    background: var(--rose-faintest);
    padding: 0.25rem 0.625rem;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    flex-shrink: 0;
    border: 1px solid var(--line-rose);
}

.order-details {
    color: var(--ink-soft);
    font-size: 0.875rem;
    line-height: 1.5;
}
.order-details strong { color: var(--ink); font-weight: 600; }

.order-date {
    display: flex; align-items: center; gap: 0.5rem;
    color: var(--ink);
    font-size: 0.875rem;
}
.order-date.urgent { color: var(--red); font-weight: 600; }
.order-date svg { width: 14px; height: 14px; stroke-width: 1.75; opacity: 0.65; }

.order-next-action {
    padding-top: 1rem;
    border-top: 1px solid var(--line);
    margin-top: auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.75rem;
}
.order-action-label {
    font-size: 0.8125rem;
    color: var(--ink-soft);
    font-style: italic;
}
.order-action-label.do-now {
    color: var(--brown);
    font-weight: 600;
    font-style: normal;
}
.order-action-arrow {
    color: var(--ink-faded);
    font-size: 1.125rem;
    line-height: 1;
}

/* ========================================================================
   BUTTONS — brown is primary, not pink
   ======================================================================== */
.btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.5rem;
    padding: 0.625rem 1.125rem;
    border: none; background: none;
    border-radius: 999px;
    font-size: 0.8125rem; font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    white-space: nowrap;
    line-height: 1.2;
    touch-action: manipulation;
    font-family: var(--font-body);
}
.btn:active { transform: scale(0.97); }

.btn-primary {
    background: var(--brown); color: var(--cream);
}
.btn-primary:hover { background: var(--brown-deep); }

.btn-secondary {
    background: transparent; color: var(--brown);
    border: 1px solid var(--brown);
}
.btn-secondary:hover { background: var(--brown); color: var(--cream); }

.btn-ghost {
    background: transparent; color: var(--ink-soft);
}
.btn-ghost:hover { background: var(--rose-faintest); color: var(--brown); }

.btn-danger {
    background: transparent; color: var(--red);
    border: 1px solid var(--red);
}
.btn-danger:hover { background: var(--red); color: var(--cream); }

.btn-block { width: 100%; }
.btn-sm { padding: 0.4rem 0.875rem; font-size: 0.75rem; }
.btn-lg { padding: 0.875rem 1.5rem; font-size: 0.9375rem; }

/* ========================================================================
   ORDER DETAIL SHEET
   ======================================================================== */
#orderSheet {
    position: fixed; inset: 0; z-index: 70;
    display: none;
}
#orderSheet.open { display: block; }
.sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(61, 43, 46, 0.35);
    backdrop-filter: blur(8px);
}
.sheet-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    max-height: 94dvh;
    background: var(--bg-lighter);
    border-radius: 20px 20px 0 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding-bottom: var(--safe-bottom);
    box-shadow: 0 -10px 40px rgba(61, 43, 46, 0.18);
    animation: sheetUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes sheetUp { from { transform: translateY(20%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@media (min-width: 768px) {
    .sheet-panel {
        position: absolute;
        top: 50%; left: 50%; right: auto; bottom: auto;
        transform: translate(-50%, -50%);
        width: 96vw; max-width: 760px;
        max-height: 92vh;
        border-radius: 20px;
        animation: sheetIn 0.3s ease;
    }
    @keyframes sheetIn { from { opacity: 0; transform: translate(-50%, -48%) scale(0.97); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
}

.sheet-grabber {
    width: 36px; height: 4px;
    background: rgba(61, 43, 46, 0.18);

const h = (tag, props = {}, ...kids) => {
    const el = document.createElement(tag);
    for (const k in props) {
        if (k === 'class') el.className = props[k];
        else if (k === 'on') for (const ev in props.on) el.addEventListener(ev, props.on[ev]);
        else if (k === 'html') el.innerHTML = props[k];

async function renderDashboard() {
    const { data: orders, error } = await sb.from('orders').select('*').order('pickup_delivery_date', { ascending: true });
    if (error) throw error;
    allOrders = orders || [];

    const customerIds = [...new Set(allOrders.map(o => o.customer_id).filter(Boolean))];
    if (customerIds.length) {
        const { data: cust } = await sb.from('customers').select('*').in('id', customerIds);
        customers.clear();
        (cust || []).forEach(c => customers.set(c.id, c));
    }

    // Bucketize for queue display
    const buckets = {
        needsAttention: [],  // Active, no link generated yet
        awaitingPayment: [], // Active, link sent, awaiting customer
        inProgress: [],      // Paid, being made
        upcoming: [],        // Within 7 days
        completed: [],
        canceled: []
    };
    const now = new Date();
    for (const o of allOrders) {
        const days = daysFromNow(o.pickup_delivery_date);
        if (o.status === 'Canceled') buckets.canceled.push(o);
        else if (o.status === 'Completed') buckets.completed.push(o);
        else if (o.payment_status === 'paid') {
            if (days !== null && days <= 7 && days >= 0) buckets.upcoming.push(o);
            else buckets.inProgress.push(o);
        }
        else if (o.payment_status === 'pending') buckets.awaitingPayment.push(o);
        else buckets.needsAttention.push(o);
    }

    const c = $('#content');
    c.innerHTML = '';

    // Header
    const totalActive = buckets.needsAttention.length + buckets.awaitingPayment.length + buckets.inProgress.length + buckets.upcoming.length;
    const header = h('div', { class: 'page-header' });
    header.appendChild(h('div', { class: 'page-overline' }, 'Workspace'));
    header.appendChild(h('h1', { class: 'page-title', html: 'Orders' }));
    header.appendChild(h('p', { class: 'page-subtitle' },
        allOrders.length === 0 ? 'No orders yet. New requests will appear here.' :
        `${totalActive} active, ${buckets.completed.length} completed.`
    ));
    c.appendChild(header);

    // Smart health banner
    const healthBanner = await checkHealth();
    if (healthBanner) c.appendChild(healthBanner);

    // Search
    const searchWrap = h('div', { class: 'search-wrap' });
    searchWrap.appendChild(h('span', { html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>' }));
    const searchInput = h('input', { type: 'search', class: 'search-input', placeholder: 'Search orders, customers...' });
    searchWrap.appendChild(searchInput);
    c.appendChild(searchWrap);

    const sectionsHost = h('div');
    c.appendChild(sectionsHost);

    const renderSections = (q) => {
        sectionsHost.innerHTML = '';
        const filt = (o) => {
            if (!q) return true;
            const cu = customers.get(o.customer_id);
            const hay = [cu?.first_name, cu?.last_name, cu?.email, cu?.phone, o.event_type_name, o.flavor].join(' ').toLowerCase();
            return hay.includes(q);
        };

        // Hero card for the single most urgent thing
        const urgent = buckets.needsAttention.filter(filt);
        if (urgent.length === 1) {
            renderQueue(sectionsHost, 'Needs your attention', 'No payment link sent yet', urgent, true, true);
        } else if (urgent.length > 1) {
            renderQueue(sectionsHost, 'Needs your attention', 'No payment link sent yet', urgent, true, false);
        }
        renderQueue(sectionsHost, 'Awaiting payment', 'Link sent — waiting for customer', buckets.awaitingPayment.filter(filt));
        renderQueue(sectionsHost, 'Pickup or delivery soon', 'Paid and due within the week', buckets.upcoming.filter(filt));
        renderQueue(sectionsHost, 'In progress', 'Paid — being made', buckets.inProgress.filter(filt));
        renderQueue(sectionsHost, 'Completed', '', buckets.completed.filter(filt));
        if (buckets.canceled.length) renderQueue(sectionsHost, 'Canceled', '', buckets.canceled.filter(filt));
    };
    renderSections('');
    searchInput.oninput = e => renderSections(e.target.value.trim().toLowerCase());

    // Sidebar count
    $('#nc-dashboard').textContent = buckets.needsAttention.length + buckets.awaitingPayment.length;
    $('#nc-dashboard').classList.toggle('zero', buckets.needsAttention.length + buckets.awaitingPayment.length === 0);
    updateOtherCounts();
}

function renderOrderCard(o, priority) {
    const cust = customers.get(o.customer_id);
    const name = cust ? `${cust.first_name || ''} ${cust.last_name || ''}`.trim() : 'Unknown customer';
    const days = daysFromNow(o.pickup_delivery_date);
    const urgent = days !== null && days <= 7 && days >= 0;

    // Determine next action label
    let actionText = '';
    let actionClass = '';
    if (o.status === 'Canceled') { actionText = 'Canceled'; actionClass = ''; }
    else if (o.status === 'Completed') { actionText = 'Completed'; actionClass = ''; }
    else if (o.payment_status === 'paid') {
        actionText = urgent && days === 0 ? 'Pickup or delivery today' :
                     urgent && days === 1 ? 'Pickup or delivery tomorrow' :
                     urgent ? `Pickup or delivery in ${days} days` :
                     'Start baking';
        actionClass = urgent ? 'do-now' : '';
    }
    else if (o.payment_status === 'pending') { actionText = 'Resend or follow up'; actionClass = ''; }
    else { actionText = 'Send payment link'; actionClass = 'do-now'; }

    const card = h('button', {
        class: `order-card ${priority ? 'priority' : ''}`,
        on: { click: () => openOrderSheet(o.id) }
    });

    // Top row: name + event tag
    const top = h('div', { class: 'order-card-top' });
    const nameBlock = h('div', null,
        h('div', { class: 'order-name' }, name),
    );
    top.appendChild(nameBlock);
    if (o.event_type_name) top.appendChild(h('span', { class: 'order-event' }, o.event_type_name));
    card.appendChild(top);

    // Details
    card.appendChild(h('div', { class: 'order-details' },
        h('strong', null, `${o.cookie_amount_dzns || 0} dozen`),
        o.flavor ? ` · ${o.flavor}` : ''
    ));

    // Date
    if (o.pickup_delivery_date) {
        card.appendChild(h('div', { class: `order-date ${urgent ? 'urgent' : ''}`, html: `${CALENDAR_ICON}<span>${formatDateRelative(o.pickup_delivery_date)}</span>` }));
    }

    // Next action
    card.appendChild(h('div', { class: 'order-next-action' },
        h('span', { class: `order-action-label ${actionClass}` }, actionText),
        h('span', { class: 'order-action-arrow' }, '→')
    ));
    return card;
}

async function checkHealth() {
    try {

        const cutoff = new Date(Date.now() - 24 * 3600000).toISOString();
        const { data: stalePending } = await sb.from('orders')
            .select('id, payment_status, updated_at, stripe_checkout_session_id')

                class: 'visible',

            },
                h('span', { html: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>' }),

function calculateTotals() {
    const o = activeOrder;
    const ppd = Number(pricing?.price_per_dozen||0);
    const dz = Number(o?.cookie_amount_dzns||0);
    const base = dz * ppd;
    const consult = o?.consultation_requested ? Number(pricing?.consultation_fee||0) : 0;
    const gift = o?.gift_note ? Number(pricing?.gift_note_fee||0) : 0;
    const feeSum = adjustments.filter(a=>a.kind==='fee').reduce((s,a)=>s+a.amount,0);
    const discSum = adjustments.filter(a=>a.kind==='discount').reduce((s,a)=>s+a.amount,0);
    const baseForCodes = base + consult + gift + feeSum;

    let codeDisc = 0, refDisc = 0;
    if (discountDetails && discountDetails.amount > 0) {
        const v = Number(discountDetails.amount);
        codeDisc = discountDetails.type === 'percent' ? baseForCodes * (v/100) : Math.min(v, baseForCodes);
    }
    if (referralDetails && referralDetails.referee_discount > 0) {
        refDisc = baseForCodes * (Number(referralDetails.referee_discount)/100);
    }
    const total = Math.max(0, base + consult + gift + feeSum - discSum - codeDisc - refDisc);
    return { ppd, dz, base, consult, gift, feeSum, discSum, codeDisc, refDisc, total };
}

function renderOrderSheet() {

}

async function markPaidManually(amount) {
    if (!confirm(`Mark this order as paid for ${money(amount)}? This bypasses Stripe and is permanent.`)) return;
    await sb.from('orders').update({
        payment_status: 'paid',
        paid_at: new Date().toISOString(),
        payment_amount: amount
    }).eq('id', activeOrder.id);
    activeOrder = {...activeOrder, payment_status: 'paid', paid_at: new Date().toISOString(), payment_amount: amount};
    renderOrderSheet();
}

async function generateCheckout() {
    if (!activeOrder) return;
    const t = calculateTotals();
    const lineItems = [];
    if (t.base > 0) lineItems.push({ label: `Custom Cookies (${t.dz} dozen)`, amount: t.base, quantity: 1 });
    if (t.consult > 0) lineItems.push({ label: 'Consultation', amount: t.consult, quantity: 1 });
    if (t.gift > 0) lineItems.push({ label: 'Gift Note', amount: t.gift, quantity: 1 });
    for (const a of adjustments) {
        lineItems.push({ label: a.label, amount: a.kind === 'discount' ? -Math.abs(a.amount) : a.amount, quantity: 1 });
    }
    if (t.codeDisc > 0) lineItems.push({ label: `Discount: ${activeOrder.discount_code_used}`, amount: -t.codeDisc, quantity: 1 });
    if (t.refDisc > 0) lineItems.push({ label: `Referral: ${activeOrder.referral_code_used}`, amount: -t.refDisc, quantity: 1 });

    const card = document.querySelector('.stripe-card');
    if (card) card.innerHTML = '<div class="center-spinner"><div class="spinner"></div></div>';

    try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout-session`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
            body: JSON.stringify({
                orderId: activeOrder.id,
                lineItems,
                customerEmail: activeCustomer?.email || '',
                customerName: `${activeCustomer?.first_name||''} ${activeCustomer?.last_name||''}`.trim()
            })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || `Error ${res.status}`);
        const { data: fresh } = await sb.from('orders').select('*').eq('id', activeOrder.id).single();
        activeOrder = fresh;
        renderOrderSheet();
    } catch (e) {
        const msg = e.message.includes('STRIPE_SECRET') || e.message.includes('configured')
            ? 'Stripe secret key isn\'t configured yet. Add STRIPE_SECRET_KEY in Supabase → Edge Functions → Secrets.'
            : e.message;
        alert(`Stripe: ${msg}`);
        renderOrderSheet();
    }
}

        on: { click: async () => {
            const label = labelI.value.trim(); const amount = Number(amtI.value);
            if (!label || !amount || amount <= 0) return alert('Need a label and positive amount');
            const { data, error } = await sb.from('order_adjustments').insert({
                order_id: activeOrder.id, label, amount, kind: kindI.value
            }).select('*').single();
            if (error) return alert(error.message);
            adjustments.unshift({...data, amount: Number(data.amount)});
            renderOrderSheet();
        }}
    }, 'Add');
    form.append(labelI, amtI, kindI, addBtn);
    sec.appendChild(form);

    const list = h('div', { class: 'adj-list' });
    if (!adjustments.length) list.appendChild(h('p', { class: 'text-faded', style: 'text-align: center; padding: 0.75rem; font-size: 0.875rem;' }, 'None yet'));
    for (const a of adjustments) {
        list.appendChild(h('div', { class: 'adj-item' },
            h('span', { class: 'adj-item-label' }, a.label),
            h('span', { class: `adj-item-amount ${a.kind}` }, (a.kind==='discount'?'−':'')+money(a.amount)),
            h('button', { class: 'adj-item-remove', on: { click: async () => {
                if (!confirm('Remove?')) return;
                await sb.from('order_adjustments').delete().eq('id', a.id);
                adjustments = adjustments.filter(x => x.id !== a.id);
                renderOrderSheet();
            }}}, '×')
        ));
    }
    sec.appendChild(list);
    return sec;
}

function renderSurvey(o) {
    const sec = h('div', { class: 'detail-card' });
    sec.appendChild(h('h3', null, 'Customer Survey'));
    const slot = h('div', null, h('div', { class: 'center-spinner' }, h('div', { class: 'spinner' })));
    sec.appendChild(slot);
    sb.from('survey_tokens').select('*').eq('order_id', o.id).order('created_at', { ascending: false }).limit(1).maybeSingle()
        .then(({ data: tok }) => {
            slot.innerHTML = '';
            if (!tok) {
                slot.appendChild(h('div', { class: 'survey-status-row none' }, 'No survey sent yet.'));
                slot.appendChild(h('button', {
                    class: 'btn btn-primary btn-block btn-sm',
                    on: { click: () => generateSurveyToken(o.id, slot) }
                }, 'Generate survey link'));
                return;
            }
            const url = `${SURVEY_BASE}?token=${tok.token}`;
            const expired = tok.expires_at && new Date(tok.expires_at) < new Date();
            const used = tok.used;
            const status = used ? 'completed' : expired ? 'expired' : 'active';
            const labels = { active: `Active · expires ${formatDate(tok.expires_at)}`, expired: `Expired ${formatDate(tok.expires_at)}`, completed: `Completed ${tok.used_at?formatDate(tok.used_at):''}` };
            slot.appendChild(h('div', { class: `survey-status-row ${status}` }, labels[status]));
            if (!used) {
                slot.appendChild(h('div', { class: 'stripe-link-row' },
                    h('code', null, url),
                    h('button', {
                        class: 'btn btn-secondary btn-sm',
                        on: { click: (e) => { navigator.clipboard.writeText(url); e.target.textContent = 'Copied'; setTimeout(() => e.target.textContent = 'Copy', 1200); }}
                    }, 'Copy')
                ));
                if (expired) slot.appendChild(h('button', {
                    class: 'btn btn-secondary btn-sm btn-block',
                    on: { click: () => generateSurveyToken(o.id, slot) }
                }, 'Regenerate'));
            }
        });
    return sec;
}

async function generateSurveyToken(orderId, slot) {
    slot.innerHTML = '<div class="center-spinner"><div class="spinner"></div></div>';
    const bytes = new Uint8Array(24); crypto.getRandomValues(bytes);
    const token = btoa(String.fromCharCode(...bytes)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    const exp = new Date(); exp.setDate(exp.getDate()+30);
    const { error } = await sb.from('survey_tokens').insert({ token, order_id: orderId, expires_at: exp.toISOString() });
    if (error) { slot.innerHTML = `<div class="survey-status-row expired">${error.message}</div>`; return; }
    renderOrderSheet();
}

async function renderFeedback() {
    const c = $('#content');
    c.innerHTML = '';
    c.appendChild(h('div', { class: 'page-header' },
        h('div', { class: 'page-overline' }, 'Customer voices'),
        h('h1', { class: 'page-title' }, 'Feedback')
    ));

    // Tab bar
    const [revPending, revApproved, revRejected, surveyCount] = await Promise.all([
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'pending'),
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'approved'),
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'rejected'),
        sb.from('surveys').select('id', { count: 'exact', head: true })
    ]);
    const tabsBar = h('div', { class: 'tabs-bar' });
    const tabs = [
        ['reviews-pending', 'Pending reviews', revPending.count||0],
        ['reviews-approved', 'Approved', revApproved.count||0],
        ['reviews-rejected', 'Rejected', revRejected.count||0],
        ['surveys', 'Surveys', surveyCount.count||0]
    ];
    tabs.forEach(([key, label, n]) => {
        tabsBar.appendChild(h('button', {
            class: 'tab-btn' + (activeFeedbackTab === key ? ' active' : ''),
            on: { click: () => { activeFeedbackTab = key; renderFeedback(); } }
        }, label, h('span', { class: 'count' }, `(${n})`)));
    });
    c.appendChild(tabsBar);

    if (activeFeedbackTab === 'surveys') {
        await renderSurveys(c);
    } else {
        const statusKey = activeFeedbackTab.split('-')[1];
        await renderReviewsList(c, statusKey);
    }
}

async function renderSurveys(c) {
    const { data: surveys } = await sb.from('surveys').select('*').order('created_at', { ascending: false });
    if (!surveys?.length) {
        c.appendChild(h('div', { class: 'queue-empty' }, 'No survey responses yet.'));
        return;
    }
    const custIds = [...new Set(surveys.map(s=>s.customer_id).filter(Boolean))];
    let custMap = new Map();
    if (custIds.length) {
        const { data } = await sb.from('customers').select('id,first_name,last_name').in('id', custIds);
        (data||[]).forEach(x=>custMap.set(x.id, x));
    }
    const list = h('div');
    for (const s of surveys) {
        const cu = custMap.get(s.customer_id);
        const card = h('div', { class: 'review-card' });
        card.appendChild(h('div', { class: 'review-card-top' },
            h('div', null,
                h('div', { class: 'review-customer' }, cu ? `${cu.first_name||''} ${cu.last_name||''}`.trim() : 'Anonymous'),
                h('div', { class: 'review-date' }, formatDate(s.created_at))
            )
        ));
        const stars = h('div', { style: 'display:flex; gap:1.5rem; font-size:0.8125rem; color:var(--ink-soft); margin-bottom:0.5rem;' });
        if (s.cookies_stars) stars.appendChild(h('span', null, 'Cookies: ', h('span', { class: 'review-stars' }, '★'.repeat(s.cookies_stars)+'☆'.repeat(5-s.cookies_stars))));
        if (s.service_stars) stars.appendChild(h('span', null, 'Service: ', h('span', { class: 'review-stars' }, '★'.repeat(s.service_stars)+'☆'.repeat(5-s.service_stars))));
        card.appendChild(stars);
        if (s.website_review) card.appendChild(h('p', { class: 'review-text' }, `"${s.website_review}"`));
        if (s.improvements) card.appendChild(h('div', { style: 'font-size:0.8125rem; color:var(--ink-soft); margin-top:0.5rem;' }, h('strong', null, 'Improvements: '), s.improvements));
        list.appendChild(card);
    }
    c.appendChild(list);
}

async function renderReviewsList(c, statusKey) {
    const { data: reviews } = await sb.from('website_reviews').select('*').eq('status', statusKey).order('created_at', { ascending: false });
    if (!reviews?.length) {
        c.appendChild(h('div', { class: 'queue-empty' }, `No ${statusKey} reviews`));
        return;
    }
    const list = h('div');
    for (const r of reviews) {
        const card = h('div', { class: 'review-card' });
        card.appendChild(h('div', { class: 'review-card-top' },
            h('div', null,
                h('div', { class: 'review-customer' }, escapeHtml(r.customer_name || 'Anonymous')),
                h('div', { class: 'review-stars' }, '★'.repeat(r.stars||5)+'☆'.repeat(5-(r.stars||5)))
            )
        ));
        card.appendChild(h('p', { class: 'review-text' }, `"${escapeHtml(r.review_text)}"`));
        card.appendChild(h('div', { class: 'review-date' }, formatDate(r.created_at)));
        const acts = h('div', { class: 'review-actions' });
        if (statusKey === 'pending') {
            acts.appendChild(h('button', { class: 'btn btn-primary btn-sm', on: { click: () => updateReview(r.id, 'approved') }}, 'Approve'));
            acts.appendChild(h('button', { class: 'btn btn-ghost btn-sm', on: { click: () => updateReview(r.id, 'rejected') }}, 'Reject'));
        } else if (statusKey === 'approved') {
            acts.appendChild(h('button', {
                class: 'btn btn-secondary btn-sm',
                on: { click: (e) => { navigator.clipboard.writeText(`"${r.review_text}"\n— ${r.customer_name}`); e.target.textContent = 'Copied'; }}
            }, 'Copy quote'));
            acts.appendChild(h('button', { class: 'btn btn-ghost btn-sm', on: { click: () => updateReview(r.id, 'pending') }}, 'Unpublish'));
        } else {
            acts.appendChild(h('button', { class: 'btn btn-secondary btn-sm', on: { click: () => updateReview(r.id, 'pending') }}, 'Restore'));
            acts.appendChild(h('button', { class: 'btn btn-danger btn-sm', on: { click: async () => {
                if (!confirm('Permanently delete?')) return;
                await sb.from('website_reviews').delete().eq('id', r.id); renderFeedback();
            }}}, 'Delete'));
        }
        card.appendChild(acts);
        list.appendChild(card);
    }
    c.appendChild(list);
}

async function updateReview(id, status) {
    const u = { status };
    if (status === 'approved') { u.approved_at = new Date().toISOString(); u.approved_by = session.user.email; }
    await sb.from('website_reviews').update(u).eq('id', id);
    renderFeedback();
}

// ============================================================================
// EDITOR
// ============================================================================
$('#editorClose').onclick = () => $('#editor').classList.remove('open');
$('#editorCancel').onclick = () => $('#editor').classList.remove('open');
async function openEditor(cfg, row) {
    $('#editorTitle').textContent = row ? `Edit ${cfg.title}` : `Add ${cfg.title}`;
    const body = $('#editorBody');
    body.innerHTML = '';
    for (const f of cfg.fields) {
        const wrap = h('div', { class: 'field' });
        wrap.appendChild(h('label', { for: `fld_${f.key}` }, f.label));
        let input;
        if (f.type === 'textarea') input = h('textarea', { id: `fld_${f.key}`, rows: 3 });
        else if (f.type === 'select') {
            input = h('select', { id: `fld_${f.key}` });
            for (const o of f.options) input.appendChild(h('option', { value: o }, o));
        } else if (f.type === 'customer') {
            input = h('select', { id: `fld_${f.key}` });
            input.appendChild(h('option', { value: '' }, '— Select customer —'));
            const { data } = await sb.from('customers').select('id,first_name,last_name').limit(1000);
            (data||[]).forEach(cc => input.appendChild(h('option', { value: cc.id }, `${cc.first_name} ${cc.last_name}`)));
        } else {
            input = h('input', { id: `fld_${f.key}`, type: f.type, step: f.step });
        }
        if (row && row[f.key] != null) {
            input.value = f.type === 'date' ? dateOnly(row[f.key]) : row[f.key];
        }
        wrap.appendChild(input);
        body.appendChild(wrap);
    }
    $('#editorDelete').classList.toggle('hidden', !row || cfg.table === 'pricing');
    $('#editorDelete').onclick = async () => {
        if (!confirm('Delete?')) return;
        await sb.from(cfg.table).delete().eq('id', row.id);
        $('#editor').classList.remove('open');
        goToPage(currentPage);
    };
    $('#editorSave').onclick = async () => {
        const payload = {};
        for (const f of cfg.fields) {
            const el = document.getElementById(`fld_${f.key}`);
            let v = el.value;
            if (f.transform) v = f.transform(v);
            if (v === '' || v === null) v = null;
            else if (f.type === 'number' && v !== null) v = Number(v);
            payload[f.key] = v;
        }
        const result = row && row.id
            ? await sb.from(cfg.table).update(payload).eq('id', row.id).select('*').single()
            : await sb.from(cfg.table).insert(payload).select('*').single();
        if (result.error) return alert(result.error.message);
        $('#editor').classList.remove('open');
        goToPage(currentPage);
    };
    $('#editor').classList.add('open');
}

async function updateOtherCounts() {
    try {
        const { count: pending } = await sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'pending');
        const c = pending || 0;
        $('#nc-feedback').textContent = c;

function wireRealtime() {
    sb.channel('orders-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
        if (currentPage === 'dashboard') renderDashboard();
    }).subscribe();
    sb.channel('reviews-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'website_reviews' }, () => {
        if (currentPage === 'feedback') renderFeedback();
        updateOtherCounts();
    }).subscribe();
}

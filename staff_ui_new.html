<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#5c3a3d"/>
<title>Rebel Ribbon · Command Center</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Lato:wght@300;400;500;700&display=swap');

/* ============================================================
   DESIGN TOKENS — Rebel Ribbon brand
   ============================================================ */
:root {
    --bg-base: #f5e6e3;
    --bg-light: #fce4dc;
    --bg-lighter: #fdf2ee;
    --cream: #fdf8f3;
    --cream-soft: #fbf3eb;
    --ink: #3d2b2e;
    --ink-soft: #806b6e;
    --ink-faded: #a89898;
    --brown: #5c3a3d;
    --brown-deep: #432a2c;
    --rose: #d4a5a5;
    --rose-deep: #b8847e;
    --rose-soft: #ecc8c2;
    --rose-faintest: #fdf0ec;
    --green: #6b8e6f;
    --green-soft: #e3ede4;
    --amber: #b8895c;
    --amber-soft: #f5e8d7;
    --red: #a85651;
    --red-soft: #f2dad8;
    --blue: #6b85a8;
    --blue-soft: #e1e8f0;
    --line: rgba(61, 43, 46, 0.08);
    --line-strong: rgba(61, 43, 46, 0.16);
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    --shadow-xs: 0 1px 2px rgba(61, 43, 46, 0.04);
    --shadow: 0 4px 16px -4px rgba(61, 43, 46, 0.08);
    --shadow-lg: 0 20px 50px -20px rgba(61, 43, 46, 0.18);
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
    --sidebar-w: 240px;
    --topbar-h: 60px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink);
    background:
        radial-gradient(at 0% 0%, var(--bg-light) 0px, transparent 50%),
        radial-gradient(at 100% 100%, var(--bg-base) 0px, transparent 50%),
        var(--bg-lighter);
    background-attachment: fixed;
    min-height: 100dvh;
    overscroll-behavior: none;
    letter-spacing: 0.005em;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: var(--brown); text-decoration: none; }
a:hover { color: var(--brown-deep); text-decoration: underline; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: rgba(61, 43, 46, 0.15); border-radius: 999px; }
::-webkit-scrollbar-track { background: transparent; }

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
.display { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.005em; }
.display em { font-style: italic; color: var(--rose-deep); font-weight: 400; }

/* ============================================================
   SIGN IN
   ============================================================ */
#signin {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
    background:
        radial-gradient(at 30% 30%, var(--bg-light) 0px, transparent 50%),
        radial-gradient(at 70% 70%, var(--rose-soft) 0px, transparent 50%),
        var(--cream);
}
.signin-card {
    width: 100%; max-width: 380px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 3rem 2.25rem 2.25rem;
    box-shadow: var(--shadow-lg);
    position: relative;
}
.signin-bow {
    position: absolute; top: -32px; left: 50%; transform: translateX(-50%);
    width: 64px; height: 64px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
}
.signin-bow img { width: 36px; height: 36px; }
.signin-title {
    font-family: var(--font-display);
    font-size: 1.75rem; font-weight: 500;
    text-align: center; margin-bottom: 0.25rem;
    color: var(--ink);
}
.signin-title em { font-style: italic; color: var(--rose-deep); font-weight: 400; }
.signin-sub {
    font-size: 0.7rem; color: var(--ink-faded);
    text-align: center; margin-bottom: 2rem;
    text-transform: uppercase; letter-spacing: 0.15em;
}
.field { margin-bottom: 1.125rem; }
.field label {
    display: block;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 0.4rem;
}
.field input, .field select, .field textarea {
    width: 100%; padding: 0.7rem 0.9rem;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: white;
    font-size: 0.9rem;
    color: var(--ink);
}
.field input::placeholder { color: var(--ink-faded); }
.field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--brown);
    box-shadow: 0 0 0 3px rgba(92, 58, 61, 0.08);
}
.auth-msg {
    margin-top: 0.75rem; padding: 0.6rem 0.9rem;
    background: var(--red-soft); color: var(--red);
    border-radius: 6px; font-size: 0.8rem;
    display: none;
}
.auth-msg.visible { display: block; }

/* ============================================================
   APP SHELL
   ============================================================ */
#app { display: none; min-height: 100dvh; }
#app.visible { display: block; }

.topbar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 50;
    padding-top: var(--safe-top);
    background: rgba(253, 248, 243, 0.88);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--line);
}
.topbar-inner {
    display: flex; align-items: center; gap: 1rem;
    height: var(--topbar-h); padding: 0 1.25rem;
}
.menu-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--ink);
    border-radius: 8px;
    flex-shrink: 0;
}
.menu-btn:hover { background: var(--rose-faintest); }
.menu-btn svg { width: 22px; height: 22px; stroke-width: 1.5; }
@media (min-width: 1024px) { .menu-btn { display: none; } }

.topbar-brand { display: flex; align-items: center; gap: 0.6rem; }
.topbar-brand img { width: 30px; height: 30px; }
.topbar-brand-text {
    font-family: var(--font-display);
    font-size: 1.25rem; font-weight: 500;
    color: var(--ink);
}
.topbar-brand-text em { font-style: italic; color: var(--rose-deep); font-weight: 400; }

.topbar-spacer { flex: 1; }

.global-search {
    position: relative;
    max-width: 280px; flex: 1;
}
.global-search input {
    width: 100%; padding: 0.5rem 0.85rem 0.5rem 2.25rem;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 0.85rem;
}
.global-search input:focus {
    outline: none; border-color: var(--brown);
    background: white;
}
.global-search svg {
    position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--ink-faded);
    pointer-events: none;
}
@media (max-width: 640px) {
    .global-search { display: none; }
}

.user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--rose-soft);
    color: var(--brown);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;
    border: 1px solid var(--line);
    flex-shrink: 0;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
#sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px; z-index: 60;
    background: var(--cream);
    padding-top: calc(var(--safe-top) + 1.25rem);
    padding-bottom: calc(var(--safe-bottom) + 1rem);
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 4px 0 24px rgba(61, 43, 46, 0.08);
    display: flex; flex-direction: column;
    overflow-y: auto;
}
#sidebar.open { transform: translateX(0); }

@media (min-width: 1024px) {
    #sidebar {
        transform: translateX(0);
        width: var(--sidebar-w);
        box-shadow: none;
        border-right: 1px solid var(--line);
        z-index: 51;
        padding-top: calc(var(--safe-top) + 1.25rem);
    }
    .sidebar-backdrop { display: none !important; }
}

.sidebar-backdrop {
    position: fixed; inset: 0; z-index: 55;
    background: rgba(61, 43, 46, 0.4);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
}
.sidebar-backdrop.visible { opacity: 1; pointer-events: auto; }

.sidebar-brand {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0 1.5rem 1.5rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 1rem;
}
.sidebar-brand img { width: 32px; height: 32px; }
.sidebar-brand-text {
    font-family: var(--font-display);
    font-size: 1.2rem; font-weight: 500;
    color: var(--ink);
}
.sidebar-brand-text em { font-style: italic; color: var(--rose-deep); font-weight: 400; }

.sidebar-section {
    padding: 0.75rem 1.5rem 0.4rem;
    font-size: 0.6rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--ink-faded);
}
.nav-item {
    display: flex; align-items: center;
    padding: 0.55rem 1.5rem;
    width: 100%; text-align: left;
    font-size: 0.9rem; font-weight: 400;
    color: var(--ink);
    border-left: 2px solid transparent;
}
.nav-item:hover { background: var(--rose-faintest); }
.nav-item.active {
    background: var(--rose-faintest);
    border-left-color: var(--brown);
    color: var(--brown);
    font-weight: 600;
}
.nav-count {
    margin-left: auto;
    background: var(--line);
    color: var(--ink-soft);
    font-size: 0.65rem; font-weight: 600;
    padding: 0.05rem 0.5rem;
    border-radius: 999px;
    min-width: 20px; text-align: center;
}
.nav-item.active .nav-count { background: var(--brown); color: var(--cream); }
.nav-count.urgent { background: var(--red); color: white; }
.nav-count.zero { display: none; }

.sidebar-footer {
    margin-top: auto;
    padding: 1rem 1.5rem 0;
    border-top: 1px solid var(--line);
}
.sidebar-user {
    font-size: 0.7rem; color: var(--ink-soft);
    margin-bottom: 0.5rem;
    overflow: hidden; text-overflow: ellipsis;
}
.btn-signout {
    width: 100%; padding: 0.5rem;
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
}
.btn-signout:hover { background: var(--brown); color: var(--cream); border-color: var(--brown); }

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
main {
    padding-top: calc(var(--topbar-h) + var(--safe-top));
    padding-bottom: calc(var(--safe-bottom) + 3rem);
    min-height: 100dvh;
}
@media (min-width: 1024px) { main { padding-left: var(--sidebar-w); } }
.main-inner {
    max-width: 1400px;
    padding: 1.5rem 1rem;
    margin: 0 auto;
}
@media (min-width: 768px) { .main-inner { padding: 2rem; } }
@media (min-width: 1024px) { .main-inner { padding: 2.25rem 2.5rem; } }

/* ============================================================
   COMMAND CENTER — the dashboard
   ============================================================ */
.cc-greeting {
    margin-bottom: 1.5rem;
}
.cc-greeting-overline {
    font-size: 0.65rem;
    text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--ink-faded);
    margin-bottom: 0.3rem;
}
.cc-greeting-title {
    font-family: var(--font-display);
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.1;
}
.cc-greeting-title em { font-style: italic; color: var(--rose-deep); font-weight: 400; }
.cc-greeting-sub {
    color: var(--ink-soft);
    font-size: 0.875rem;
    margin-top: 0.5rem;
}

/* ============================================================
   STAT TILES — money/orders at a glance
   ============================================================ */
.stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
}
@media (min-width: 768px) { .stat-grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; } }

.stat-tile {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 1rem 1.125rem;
    transition: border-color 0.2s;
}
.stat-tile:hover { border-color: var(--line-strong); }
.stat-tile-label {
    font-size: 0.65rem;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--ink-faded);
    margin-bottom: 0.5rem;
    font-weight: 600;
}
.stat-tile-value {
    font-family: var(--font-display);
    font-size: 1.625rem;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.1;
}
.stat-tile-value.urgent { color: var(--red); }
.stat-tile-value.muted { color: var(--ink-soft); }
.stat-tile-meta {
    font-size: 0.7rem;
    color: var(--ink-soft);
    margin-top: 0.3rem;
}
.stat-tile-meta.green { color: var(--green); }
.stat-tile-meta.amber { color: var(--amber); }

/* ============================================================
   COMMAND PANELS — the main content blocks
   ============================================================ */
.cc-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
}
@media (min-width: 1100px) { .cc-grid { grid-template-columns: 2fr 1fr; } }

.panel {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
}
.panel-head {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 0.75rem;
}
.panel-title {
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 600;
    color: var(--ink);
    letter-spacing: 0;
}
.panel-meta {
    font-size: 0.7rem;
    color: var(--ink-faded);
    text-transform: uppercase; letter-spacing: 0.1em;
}
.panel-body { padding: 0.5rem 0; }
.panel-empty {
    padding: 2rem 1.25rem;
    text-align: center;
    color: var(--ink-faded);
    font-size: 0.85rem;
    font-style: italic;
}

/* ============================================================
   ACTION QUEUE — the "do this next" list
   ============================================================ */
.action-row {
    display: flex; align-items: center; gap: 0.875rem;
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--line);
    width: 100%;
    text-align: left;
    transition: background 0.15s;
}
.action-row:last-child { border-bottom: none; }
.action-row:hover { background: var(--rose-faintest); cursor: pointer; }

.action-marker {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--ink-faded);
}
.action-marker.urgent { background: var(--red); box-shadow: 0 0 0 4px var(--red-soft); }
.action-marker.warning { background: var(--amber); box-shadow: 0 0 0 4px var(--amber-soft); }
.action-marker.good { background: var(--green); box-shadow: 0 0 0 4px var(--green-soft); }

.action-body {
    flex: 1;
    min-width: 0;
}
.action-name {
    font-weight: 600;
    font-size: 0.925rem;
    color: var(--ink);
    line-height: 1.3;
}
.action-name .vip-star {
    color: var(--amber);
    margin-left: 0.3rem;
    font-size: 0.75rem;
}
.action-desc {
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin-top: 0.2rem;
    line-height: 1.4;
}
.action-desc strong { color: var(--ink); font-weight: 600; }
.action-cta {
    flex-shrink: 0;
    font-size: 0.75rem;
    color: var(--brown);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
}
.action-cta.urgent { color: var(--red); }
@media (max-width: 540px) {
    .action-cta { display: none; }
}

/* ============================================================
   SCHEDULE — week ahead view
   ============================================================ */
.schedule-row {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 0.875rem;
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--line);
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
}
.schedule-row:last-child { border-bottom: none; }
.schedule-row:hover { background: var(--rose-faintest); }

.schedule-date {
    text-align: center;
    background: var(--cream-soft);
    border-radius: 8px;
    padding: 0.35rem 0;
    border: 1px solid var(--line);
}
.schedule-date.urgent {
    background: var(--red-soft);
    border-color: var(--red);
}
.schedule-date-day {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    font-weight: 600;
    line-height: 1;
}
.schedule-date.urgent .schedule-date-day { color: var(--red); }
.schedule-date-num {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.1;
}
.schedule-date.urgent .schedule-date-num { color: var(--red); }

.schedule-body { min-width: 0; }
.schedule-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.3;
}
.schedule-detail {
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 0.15rem;
}
.schedule-detail .pickup-tag {
    display: inline-block;
    font-size: 0.65rem;
    background: var(--rose-faintest);
    color: var(--brown);
    padding: 0.05rem 0.4rem;
    border-radius: 4px;
    margin-left: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
}

/* ============================================================
   ACTIVITY FEED — what's happening
   ============================================================ */
.activity-row {
    display: flex; gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--line);
    align-items: flex-start;
}
.activity-row:last-child { border-bottom: none; }
.activity-dot {
    width: 6px; height: 6px;
    background: var(--rose);
    border-radius: 50%;
    margin-top: 0.55rem;
    flex-shrink: 0;
}
.activity-body { flex: 1; min-width: 0; }
.activity-text {
    font-size: 0.85rem;
    color: var(--ink);
    line-height: 1.4;
}
.activity-text strong { font-weight: 600; }
.activity-time {
    font-size: 0.7rem;
    color: var(--ink-faded);
    margin-top: 0.15rem;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.4rem;
    padding: 0.55rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: var(--font-body);
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--brown); color: var(--cream); }
.btn-primary:hover { background: var(--brown-deep); }
.btn-secondary { background: transparent; color: var(--brown); border: 1px solid var(--brown); }
.btn-secondary:hover { background: var(--brown); color: var(--cream); }
.btn-ghost { background: transparent; color: var(--ink-soft); }
.btn-ghost:hover { background: var(--rose-faintest); color: var(--brown); }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.72rem; }
.btn-block { width: 100%; }

/* ============================================================
   ORDER DETAIL SHEET (kept lightweight for now — full rebuild in phase 2)
   ============================================================ */
#orderSheet {
    position: fixed; inset: 0; z-index: 70;
    display: none;
}
#orderSheet.open { display: block; }
.sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(61, 43, 46, 0.35);
    backdrop-filter: blur(8px);
}
.sheet-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    max-height: 94dvh;
    background: var(--bg-lighter);
    border-radius: 20px 20px 0 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding-bottom: var(--safe-bottom);
    box-shadow: 0 -10px 40px rgba(61, 43, 46, 0.18);
    animation: sheetUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes sheetUp { from { transform: translateY(20%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@media (min-width: 768px) {
    .sheet-panel {
        position: absolute;
        top: 50%; left: 50%; right: auto; bottom: auto;
        transform: translate(-50%, -50%);
        width: 96vw; max-width: 800px;
        max-height: 92vh;
        border-radius: 20px;
        animation: sheetIn 0.3s ease;
    }
    @keyframes sheetIn { from { opacity: 0; transform: translate(-50%, -48%) scale(0.97); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
}
.sheet-grabber {
    width: 36px; height: 4px;

<script>
// ============================================================================
// REBEL RIBBON · Command Center · v6
// CRM/OMS/POS workspace with real data joins and a command-center dashboard
// ============================================================================
const SUPABASE_URL = 'https://zyntkwammltmjjvgelwg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bnRrd2FtbWx0bWpqdmdlbHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MzkxNjYsImV4cCI6MjA3ODExNTE2Nn0.eLkkGBuSRNUd7P7mJT5Be-dsvVjGBZ9pkupQq6KGT9A';
const SURVEY_BASE = 'https://rebelribbon.com/survey.html';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// helpers
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const h = (tag, props = {}, ...kids) => {
    const el = document.createElement(tag);
    for (const k in props) {
        if (k === 'class') el.className = props[k];
        else if (k === 'on') for (const ev in props.on) el.addEventListener(ev, props.on[ev]);
        else if (k === 'html') el.innerHTML = props[k];
        else if (k in el) el[k] = props[k];
        else el.setAttribute(k, props[k]);
    }
    for (const k of kids.flat()) if (k != null) el.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
    return el;
};
const money = n => '$' + (Number(n||0)).toFixed(2);
const dateOnly = d => { if (!d) return ''; const dt = new Date(d); return new Date(dt.getTime() - dt.getTimezoneOffset()*60000).toISOString().slice(0,10); };
const formatDate = d => { if (!d) return ''; const dt = new Date(d.includes && d.includes('T') ? d : d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const formatDateShort = d => { if (!d) return ''; const dt = new Date(d.includes && d.includes('T') ? d : d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
const formatTime = d => { if (!d) return ''; return new Date(d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); };
const formatRelative = d => {
    if (!d) return '';
    const dt = new Date(d);
    const seconds = Math.round((Date.now() - dt.getTime()) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.round(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.round(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.round(hours / 24);
    if (days < 7) return `${days}d ago`;
    return formatDate(d.toISOString ? d.toISOString() : d);
};
const formatPhone = p => { if (!p) return ''; const c = (''+p).replace(/\D/g,''); const m = c.match(/^(\d{3})(\d{3})(\d{4})$/); return m ? `(${m[1]}) ${m[2]}-${m[3]}` : p; };
const initials = (e, name) => {
    if (name) return name.split(/\s+/).filter(Boolean).map(x=>x[0]).join('').slice(0,2).toUpperCase();
    return (e||'').split('@')[0].split(/[._-]/).map(x=>x[0]).join('').slice(0,2).toUpperCase() || 'RR';
};
const onlyCompanyEmail = e => /@rebelribbon\.com$/i.test(e);
const escapeHtml = t => { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };
const daysFromNow = d => { if (!d) return null; return Math.round((new Date(d+'T00:00:00') - new Date(new Date().toDateString())) / 86400000); };
const startOfDay = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };

const CALENDAR_ICON = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
const CLOCK_ICON = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

// State
let session = null;
let currentPage = 'dashboard';
let activeOrder = null;
let activeCustomer = null;
let adjustments = [];
let pricing = null;
let activeFeedbackTab = 'reviews-pending';

// ============================================================================
// AUTH
// ============================================================================
$('#signInBtn').onclick = async () => {
    const email = $('#email').value.trim();
    const password = $('#password').value;
    const msg = $('#authMsg');
    msg.classList.remove('visible');
    if (!onlyCompanyEmail(email)) {
        msg.textContent = 'Please use your @rebelribbon.com email.';
        msg.classList.add('visible'); return;
    }
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { msg.textContent = error.message; msg.classList.add('visible'); return; }
    bootstrap();
};
$('#signOutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };

async function bootstrap() {
    const { data: { session: s } } = await sb.auth.getSession();
    if (!s) return;
    if (!onlyCompanyEmail(s.user?.email)) { await sb.auth.signOut(); return; }
    session = s;
    $('#signin').style.display = 'none';
    $('#app').classList.add('visible');
    $('#userAvatar').textContent = initials(s.user.email);
    $('#sidebarUser').textContent = s.user.email;
    wireSidebar();
    await loadPricing();
    await goToPage('dashboard');
    wireRealtime();
}

function wireSidebar() {
    $('#menuBtn').onclick = () => openSidebar();
    $('#sidebarBackdrop').onclick = () => closeSidebar();
    $$('.nav-item').forEach(b => b.onclick = () => { goToPage(b.dataset.page); closeSidebar(); });
}
function openSidebar() { $('#sidebar').classList.add('open'); $('#sidebarBackdrop').classList.add('visible'); }
function closeSidebar() { $('#sidebar').classList.remove('open'); $('#sidebarBackdrop').classList.remove('visible'); }

async function goToPage(page) {
    currentPage = page;
    $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
    const c = $('#content');
    c.innerHTML = '<div class="center-spinner"><div class="spinner"></div></div>';
    try {
        if (page === 'dashboard') await renderCommandCenter();
        else if (page === 'orders') await renderAllOrders();
        else if (page === 'feedback') await renderFeedback();
        else if (page === 'pricing') await renderPricing();
        else await renderSettingsList(page);
    } catch (e) {
        console.error(e);
        c.innerHTML = `<div class="panel"><div class="panel-empty">Error: ${escapeHtml(e.message)}</div></div>`;
    }
}

async function loadPricing() {
    const { data } = await sb.from('pricing').select('*').limit(1).maybeSingle();
    pricing = data || {};
}

// ============================================================================
// COMMAND CENTER
// ============================================================================
async function renderCommandCenter() {
    // ONE query for all orders with customer data attached
    const { data: orders, error } = await sb.from('orders_full').select('*').order('pickup_delivery_date', { ascending: true });
    if (error) throw error;

    const today = startOfDay();
    const weekFromNow = new Date(today); weekFromNow.setDate(weekFromNow.getDate() + 7);

    // Classify orders
    const active = orders.filter(o => o.status === 'Active');
    const completed = orders.filter(o => o.status === 'Completed');

    // Money snapshot
    const monthAgo = new Date(today); monthAgo.setDate(monthAgo.getDate() - 30);
    const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);
    const moneyThisWeek = orders.filter(o => o.paid_at && new Date(o.paid_at) >= weekAgo).reduce((s,o) => s + Number(o.payment_amount||0), 0);
    const moneyThisMonth = orders.filter(o => o.paid_at && new Date(o.paid_at) >= monthAgo).reduce((s,o) => s + Number(o.payment_amount||0), 0);
    const outstanding = active.filter(o => o.payment_status !== 'paid').reduce((s,o) => {
        const total = calculateOrderTotal(o);
        return s + total;
    }, 0);

    // Action queue: things that need staff intervention
    const actionQueue = buildActionQueue(active, today);

    // Schedule: orders with pickup in next 14 days
    const upcoming = orders.filter(o => {
        if (o.status === 'Canceled') return false;
        if (!o.pickup_delivery_date) return false;
        const days = daysFromNow(o.pickup_delivery_date);
        return days !== null && days >= 0 && days <= 14;
    });

    // Render
    const c = $('#content');
    c.innerHTML = '';

    // Greeting
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    const firstName = session.user.email.split('@')[0].split(/[._-]/)[0];
    const firstNameCap = firstName.charAt(0).toUpperCase() + firstName.slice(1);

    const greetingBlock = h('div', { class: 'cc-greeting' });
    greetingBlock.appendChild(h('div', { class: 'cc-greeting-overline' }, new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })));
    greetingBlock.appendChild(h('h1', { class: 'cc-greeting-title', html: `${greeting}, <em>${escapeHtml(firstNameCap)}</em>` }));
    if (active.length === 0) {
        greetingBlock.appendChild(h('p', { class: 'cc-greeting-sub' }, 'No active orders. Quiet day in the kitchen.'));
    } else if (actionQueue.length === 0) {

    if (upcoming.length === 0) {

    $('#nc-orders').textContent = active.length;

}

function calculateOrderTotal(o) {
    const ppd = Number(pricing?.price_per_dozen || 0);
    const dz = Number(o.cookie_amount_dzns || 0);
    const base = dz * ppd;
    const consult = o.consultation_requested ? Number(pricing?.consultation_fee || 0) : 0;
    const gift = o.gift_note ? Number(pricing?.gift_note_fee || 0) : 0;
    return base + consult + gift;
}

function buildActionQueue(activeOrders, today) {
    const queue = [];
    for (const o of activeOrders) {
        const days = daysFromNow(o.pickup_delivery_date);
        const name = `${o.customer_first_name || ''} ${o.customer_last_name || ''}`.trim() || 'Unknown';

        // No payment link sent
        if (!o.payment_status || o.payment_status === 'unpaid') {
            queue.push({
                order: o, name, urgency: days !== null && days <= 5 ? 'urgent' : 'warning',
                desc: `${o.cookie_amount_dzns||0} dozen · ${o.event_type_name || 'event'} · ${days !== null ? formatDateRelativeShort(days, o.pickup_delivery_date) : 'no date'}`,
                cta: 'Send payment link'
            });
        }
        // Payment sent but stale (5+ days old, no response)
        else if (o.payment_status === 'pending') {
            const updated = new Date(o.updated_at);
            const hoursSince = (Date.now() - updated.getTime()) / 3600000;
            if (hoursSince > 72) {
                queue.push({
                    order: o, name, urgency: 'warning',
                    desc: `Payment link sent ${Math.round(hoursSince/24)}d ago — no response yet`,
                    cta: 'Follow up'
                });
            }
        }
        // Paid, pickup is today or tomorrow
        else if (o.payment_status === 'paid' && days !== null && days >= 0 && days <= 1) {
            const baked = !!o.baked_at;
            const packaged = !!o.packaged_at;
            const handedOff = !!o.handed_off_at;
            if (handedOff) continue; // truly done, just hasn't been marked Completed
            const action = !baked ? 'Time to bake' : !packaged ? 'Package these' : 'Ready for pickup';
            queue.push({
                order: o, name, urgency: 'urgent',
                desc: `${o.cookie_amount_dzns||0} dozen · ${days === 0 ? 'pickup TODAY' : 'pickup tomorrow'} · ${o.pickup_delivery_type || '—'}`,
                cta: action
            });
        }
        // Paid, pickup in next 5 days, not yet started baking
        else if (o.payment_status === 'paid' && days !== null && days <= 5 && days > 1 && !o.baked_at) {
            queue.push({
                order: o, name, urgency: 'warning',
                desc: `${o.cookie_amount_dzns||0} dozen · pickup in ${days} days · not started`,
                cta: 'Start baking'
            });
        }
    }
    // Sort: urgent first
    queue.sort((a,b) => {
        const order = { urgent: 0, warning: 1, normal: 2 };
        return (order[a.urgency] ?? 3) - (order[b.urgency] ?? 3);
    });
    return queue;
}

function formatDateRelativeShort(days, dateStr) {
    if (days === 0) return 'TODAY';
    if (days === 1) return 'tomorrow';
    if (days < 0) return `${Math.abs(days)}d ago`;
    if (days <= 7) return `in ${days}d`;
    return formatDateShort(dateStr);
}

function renderScheduleRow(o) {

function buildRecentActivity(orders) {
    const events = [];
    for (const o of orders) {
        const name = `${o.customer_first_name || ''} ${o.customer_last_name || ''}`.trim() || 'Unknown';
        if (o.paid_at) events.push({ text: `<strong>${escapeHtml(name)}</strong> paid ${money(o.payment_amount||0)}`, time: o.paid_at });
        if (o.handed_off_at) events.push({ text: `<strong>${escapeHtml(name)}</strong>'s order handed off`, time: o.handed_off_at });
        if (o.baked_at) events.push({ text: `Baked <strong>${escapeHtml(name)}</strong>'s ${o.cookie_amount_dzns||0} dozen`, time: o.baked_at });
        events.push({ text: `<strong>${escapeHtml(name)}</strong> ordered ${o.cookie_amount_dzns||0} dozen`, time: o.created_at });
    }
    events.sort((a,b) => new Date(b.time) - new Date(a.time));
    return events;
}

}

async function markPaidManually(amount) {
    if (!confirm(`Mark this order as paid for ${money(amount)}? This bypasses Stripe.`)) return;
    await sb.from('orders').update({
        payment_status: 'paid',
        paid_at: new Date().toISOString(),
        payment_amount: amount
    }).eq('id', activeOrder.id);
    await logActivity(activeOrder.id, 'manual_payment', `Marked paid manually: ${money(amount)}`);
    activeOrder = {...activeOrder, payment_status: 'paid', paid_at: new Date().toISOString(), payment_amount: amount};
    renderOrderSheet();
}

async function generateCheckout() {
    if (!activeOrder) return;
    const total = calculateOrderTotal(activeOrder);
    const lineItems = [];
    const ppd = Number(pricing?.price_per_dozen || 0);
    const dz = Number(activeOrder.cookie_amount_dzns || 0);
    if (dz > 0) lineItems.push({ label: `Custom Cookies (${dz} dozen)`, amount: dz * ppd, quantity: 1 });
    if (activeOrder.consultation_requested && pricing?.consultation_fee) lineItems.push({ label: 'Consultation', amount: pricing.consultation_fee, quantity: 1 });
    if (activeOrder.gift_note && pricing?.gift_note_fee) lineItems.push({ label: 'Gift Note', amount: pricing.gift_note_fee, quantity: 1 });

    try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout-session`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
            body: JSON.stringify({
                orderId: activeOrder.id,
                lineItems,
                customerEmail: activeOrder.customer_email || '',
                customerName: `${activeOrder.customer_first_name||''} ${activeOrder.customer_last_name||''}`.trim()
            })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || `Error ${res.status}`);
        const { data: fresh } = await sb.from('orders_full').select('*').eq('id', activeOrder.id).single();
        activeOrder = fresh;
        await logActivity(activeOrder.id, 'payment_link_created', 'Stripe checkout session generated');
        renderOrderSheet();
    } catch (e) {
        const msg = e.message.includes('STRIPE_SECRET') || e.message.includes('configured') || e.message.includes('not configured')
            ? 'Stripe secret key isn\'t set. In Supabase: Edge Functions → Secrets → add STRIPE_SECRET_KEY.'
            : e.message;
        alert(`Stripe: ${msg}`);
        renderOrderSheet();
    }
}

function renderPricingSection(o) {
    const ppd = Number(pricing?.price_per_dozen || 0);
    const dz = Number(o.cookie_amount_dzns || 0);
    const base = dz * ppd;
    const consult = o.consultation_requested ? Number(pricing?.consultation_fee || 0) : 0;
    const gift = o.gift_note ? Number(pricing?.gift_note_fee || 0) : 0;
    const feeSum = adjustments.filter(a=>a.kind==='fee').reduce((s,a)=>s+a.amount,0);
    const discSum = adjustments.filter(a=>a.kind==='discount').reduce((s,a)=>s+a.amount,0);
    const total = Math.max(0, base + consult + gift + feeSum - discSum);

    const sec = h('div', { class: 'detail-section' });
    sec.appendChild(h('h3', null, 'Pricing'));
    const rows = h('div', { class: 'pricing-rows' });
    const add = (label, val, cls = '') => rows.appendChild(h('div', { class: `pricing-row ${cls}` }, h('span', null, label), h('span', null, val)));
    add(`${dz} dozen × ${money(ppd)}`, money(base));
    if (consult > 0) add('Consultation', money(consult));
    if (gift > 0) add('Gift note', money(gift));
    for (const a of adjustments) {
        add(a.label, (a.kind === 'discount' ? '−' : '') + money(a.amount), a.kind);
    }
    add('Total', money(total), 'total');
    sec.appendChild(rows);
    return sec;
}

function renderInternalNotes(o) {
    const sec = h('div', { class: 'detail-section' });
    sec.appendChild(h('h3', null, 'Internal notes'));

async function renderFeedback() {
    const c = $('#content');
    c.innerHTML = '';
    c.appendChild(h('div', { class: 'cc-greeting' },
        h('div', { class: 'cc-greeting-overline' }, 'Customer voices'),
        h('h1', { class: 'cc-greeting-title' }, 'Feedback')
    ));

    const [revPending, revApproved, revRejected, surveyCount] = await Promise.all([
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'pending'),
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'approved'),
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'rejected'),
        sb.from('surveys').select('id', { count: 'exact', head: true })
    ]);
    const tabsBar = h('div', { style: 'display:flex; gap:0.25rem; background:var(--cream-soft); padding:0.25rem; border-radius:999px; margin-bottom:1.5rem; max-width:max-content;' });
    const tabs = [
        ['reviews-pending', 'Pending', revPending.count||0],
        ['reviews-approved', 'Approved', revApproved.count||0],
        ['reviews-rejected', 'Rejected', revRejected.count||0],
        ['surveys', 'Surveys', surveyCount.count||0]
    ];
    tabs.forEach(([key, label, n]) => {
        const isActive = activeFeedbackTab === key;
        tabsBar.appendChild(h('button', {
            class: 'btn',
            style: isActive ? 'background:var(--brown); color:var(--cream); border-radius:999px; padding:0.45rem 0.9rem; font-size:0.78rem;' : 'background:transparent; color:var(--ink-soft); border-radius:999px; padding:0.45rem 0.9rem; font-size:0.78rem; font-weight:500;',
            on: { click: () => { activeFeedbackTab = key; renderFeedback(); } }
        }, label, h('span', { style: 'opacity:0.7; margin-left:0.4rem; font-size:0.7rem;' }, `(${n})`)));
    });
    c.appendChild(tabsBar);

    if (activeFeedbackTab === 'surveys') {
        await renderSurveysList(c);
    } else {
        await renderReviewsList(c, activeFeedbackTab.split('-')[1]);
    }
}

async function renderSurveysList(c) {
    // JOIN to get customer info — the bug fix
    const { data: surveys } = await sb.from('surveys')
        .select('*, customer:customer_id (first_name, last_name, email), order:order_id (event_type_name, cookie_amount_dzns, pickup_delivery_date)')
        .order('created_at', { ascending: false });
    if (!surveys?.length) {
        c.appendChild(h('div', { class: 'panel' }, h('div', { class: 'panel-empty' }, 'No survey responses yet.')));
        return;
    }
    const panel = h('div', { class: 'panel' });
    const body = h('div', { class: 'panel-body' });
    for (const s of surveys) {
        const cu = s.customer;
        const name = cu ? `${cu.first_name||''} ${cu.last_name||''}`.trim() : 'Survey (no customer link)';
        const card = h('div', { style: 'padding: 1rem 1.25rem; border-bottom: 1px solid var(--line);' });
        const head = h('div', { style: 'display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;' });
        head.appendChild(h('div', null,
            h('div', { style: 'font-family: var(--font-display); font-weight: 600; font-size: 1rem;' }, name),
            h('div', { style: 'font-size: 0.7rem; color: var(--ink-faded); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.15rem;' }, formatDate(s.created_at))
        ));
        const stars = h('div', { style: 'text-align: right; font-size: 0.78rem; color: var(--ink-soft);' });
        if (s.cookies_stars) stars.appendChild(h('div', null, `Cookies: `, h('span', { style: 'color: var(--amber);' }, '★'.repeat(s.cookies_stars)+'☆'.repeat(5-s.cookies_stars))));
        if (s.service_stars) stars.appendChild(h('div', null, `Service: `, h('span', { style: 'color: var(--amber);' }, '★'.repeat(s.service_stars)+'☆'.repeat(5-s.service_stars))));
        head.appendChild(stars);
        card.appendChild(head);
        if (s.website_review) card.appendChild(h('p', { style: 'font-family: var(--font-display); font-style: italic; color: var(--ink); font-size: 0.95rem; line-height: 1.5; margin-top: 0.4rem;' }, `"${s.website_review}"`));
        if (s.improvements) card.appendChild(h('div', { style: 'font-size: 0.8rem; color: var(--ink-soft); margin-top: 0.5rem;' }, h('strong', null, 'Wants improved: '), s.improvements));
        body.appendChild(card);
    }
    panel.appendChild(body);
    c.appendChild(panel);
}

async function renderReviewsList(c, status) {
    const { data: reviews } = await sb.from('website_reviews').select('*').eq('status', status).order('created_at', { ascending: false });
    if (!reviews?.length) {
        c.appendChild(h('div', { class: 'panel' }, h('div', { class: 'panel-empty' }, `No ${status} reviews.`)));
        return;
    }
    const panel = h('div', { class: 'panel' });
    const body = h('div', { class: 'panel-body' });
    for (const r of reviews) {
        const card = h('div', { style: 'padding: 1rem 1.25rem; border-bottom: 1px solid var(--line);' });
        const head = h('div', { style: 'display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;' });
        head.appendChild(h('div', null,
            h('div', { style: 'font-family: var(--font-display); font-weight: 600;' }, escapeHtml(r.customer_name || 'Anonymous')),
            h('div', { style: 'color: var(--amber); font-size: 1rem; margin-top: 0.15rem;' }, '★'.repeat(r.stars||5)+'☆'.repeat(5-(r.stars||5)))
        ));
        card.appendChild(head);
        card.appendChild(h('p', { style: 'font-family: var(--font-display); font-style: italic; font-size: 0.95rem; line-height: 1.5; margin: 0.5rem 0;' }, `"${escapeHtml(r.review_text)}"`));
        card.appendChild(h('div', { style: 'font-size: 0.7rem; color: var(--ink-faded); text-transform: uppercase; letter-spacing: 0.08em;' }, formatDate(r.created_at)));
        const acts = h('div', { style: 'display: flex; gap: 0.4rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--line);' });
        if (status === 'pending') {
            acts.appendChild(h('button', { class: 'btn btn-primary btn-sm', on: { click: () => updateReview(r.id, 'approved') }}, 'Approve'));
            acts.appendChild(h('button', { class: 'btn btn-ghost btn-sm', on: { click: () => updateReview(r.id, 'rejected') }}, 'Reject'));
        } else if (status === 'approved') {
            acts.appendChild(h('button', {
                class: 'btn btn-secondary btn-sm',
                on: { click: (e) => { navigator.clipboard.writeText(`"${r.review_text}"\n— ${r.customer_name}`); e.target.textContent = 'Copied'; }}
            }, 'Copy quote'));
            acts.appendChild(h('button', { class: 'btn btn-ghost btn-sm', on: { click: () => updateReview(r.id, 'pending') }}, 'Unpublish'));
        } else {
            acts.appendChild(h('button', { class: 'btn btn-secondary btn-sm', on: { click: () => updateReview(r.id, 'pending') }}, 'Restore'));
        }
        card.appendChild(acts);
        body.appendChild(card);
    }
    panel.appendChild(body);
    c.appendChild(panel);
}

async function updateReview(id, status) {
    const u = { status };
    if (status === 'approved') { u.approved_at = new Date().toISOString(); u.approved_by = session.user.email; }
    await sb.from('website_reviews').update(u).eq('id', id);
    renderFeedback();
}

// Minimal editor modal (still uses confirm dialog for now)
function openSimpleEditor(cfg, row) {
    // For phase 1, just use a simple inline prompt for the common case.
    // Full editor coming in phase 2.
    if (cfg.fields.length === 1) {
        const f = cfg.fields[0];
        const current = row ? row[f.key] : '';
        const val = prompt(`${row ? 'Edit' : 'New'} ${cfg.title}: ${f.label}`, current ?? '');
        if (val === null) return;
        let payload = { [f.key]: f.transform ? f.transform(val) : (f.type === 'number' ? Number(val) : val) };
        const promise = row && row.id
            ? sb.from(cfg.table).update(payload).eq('id', row.id)
            : sb.from(cfg.table).insert(payload);
        promise.then(() => goToPage(currentPage));
        return;
    }
    // Fallback: alert that the full editor is coming
    alert('Full editor for multi-field records is being rebuilt. For now, please use Supabase Table Editor.');
}

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#831843"/>
<title>Rebel Ribbon · Staff</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=Allura&display=swap');

/* ========================================================================
   DESIGN TOKENS — matches rebelribbon.com brand
   ======================================================================== */
:root {
    /* Brand palette */
    --pink-50:  #fdf2f8;
    --pink-100: #fce7f3;
    --pink-200: #fbcfe8;
    --pink-300: #f9a8d4;
    --pink-500: #ec4899;
    --pink-600: #db2777;
    --pink-700: #be185d;
    --pink-800: #9d174d;
    --pink-900: #831843;
    --pink-950: #500724;

    --cream:    #fffbf5;
    --ink:      #1a0d12;
    --ink-soft: #6b4c54;
    --line:     rgba(131, 24, 67, 0.10);
    --line-strong: rgba(131, 24, 67, 0.18);

    /* Semantic */
    --success:  #15803d;
    --success-bg: #dcfce7;
    --warning:  #b45309;
    --warning-bg: #fef3c7;
    --danger:   #b91c1c;
    --danger-bg: #fee2e2;
    --info:     #1d4ed8;
    --info-bg:  #dbeafe;

    /* Type */
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-script: 'Allura', cursive;

    /* Elevation */
    --shadow-sm: 0 1px 2px rgba(131,24,67,0.06);
    --shadow:    0 4px 12px -2px rgba(131,24,67,0.08), 0 2px 6px -1px rgba(131,24,67,0.04);
    --shadow-lg: 0 20px 40px -16px rgba(131,24,67,0.18), 0 8px 16px -8px rgba(131,24,67,0.10);

    /* Layout */
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html { overflow-x: hidden; -webkit-font-smoothing: antialiased; }
body {
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--cream);
    background-image:
        radial-gradient(at 0% 0%, rgba(251, 207, 232, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(252, 231, 243, 0.5) 0px, transparent 50%);
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
}
button { font-family: inherit; cursor: pointer; }
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

/* ========================================================================
   SIGN IN
   ======================================================================== */
#signin {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
    background:
        radial-gradient(at 30% 20%, rgba(251, 207, 232, 0.6) 0px, transparent 50%),
        radial-gradient(at 80% 80%, rgba(252, 231, 243, 0.7) 0px, transparent 50%),
        var(--cream);
}
.signin-card {
    width: 100%; max-width: 380px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow-lg);
    position: relative;
}
.signin-bow {
    position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
    width: 76px; height: 76px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
}
.signin-bow img { width: 50px; height: 50px; }
.signin-title {
    font-family: var(--font-display);
    font-size: 1.75rem; font-weight: 500;
    text-align: center; margin-top: 1rem; margin-bottom: 0.25rem;
    color: var(--pink-900);
    letter-spacing: -0.01em;
}
.signin-title em { font-style: italic; color: var(--pink-600); }
.signin-sub {
    font-size: 0.8125rem; color: var(--ink-soft);
    text-align: center; margin-bottom: 2rem;
}
.field { margin-bottom: 1rem; }
.field label {
    display: block;
    font-size: 0.6875rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 0.4rem;
}
.field input, .field select, .field textarea {
    width: 100%; padding: 0.75rem 1rem;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    background: white;
    font-size: 0.9375rem;
    transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--pink-500);
    box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.12);
}
.field input::placeholder { color: #c4b5b8; }
.auth-msg {
    margin-top: 0.75rem;
    padding: 0.625rem 0.875rem;
    background: var(--danger-bg);
    color: var(--danger);
    border-radius: 8px;
    font-size: 0.8125rem;
    display: none;
}
.auth-msg.visible { display: block; }

/* ========================================================================
   APP SHELL — top bar + sidebar + content
   ======================================================================== */
#app { display: none; min-height: 100dvh; }
#app.visible { display: block; }

.topbar {
    position: sticky; top: 0; z-index: 50;
    padding-top: var(--safe-top);
    background: rgba(255, 251, 245, 0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
}
.topbar-inner {
    display: flex; align-items: center; gap: 0.75rem;
    height: 60px; padding: 0 1rem;
    max-width: 1400px; margin: 0 auto;
}
.menu-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--pink-100); color: var(--pink-700);
    border: none; border-radius: 12px;
    transition: background 0.15s;
}
.menu-btn:hover { background: var(--pink-200); }
.menu-btn:active { transform: scale(0.95); }
.menu-btn svg { width: 20px; height: 20px; }
.topbar-brand {
    display: flex; align-items: center; gap: 0.625rem;
    text-decoration: none; color: inherit;
}
.topbar-brand img { width: 36px; height: 36px; }
.topbar-brand-text {
    font-family: var(--font-display);
    font-size: 1.25rem; font-weight: 500;
    color: var(--pink-900);
    letter-spacing: 0.01em;
}
.topbar-brand-text em { font-style: italic; color: var(--pink-600); font-weight: 400; }
.topbar-spacer { flex: 1; }
.topbar-user {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.8125rem; color: var(--ink-soft);
}
.user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-300), var(--pink-600));
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 0.8125rem;
}
@media (max-width: 640px) {
    .topbar-user-name { display: none; }
}

/* ========================================================================
   SIDEBAR (slides out on all sizes — keeps content clean on desktop too)
   ======================================================================== */
#sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px; z-index: 60;
    background: white;
    padding-top: calc(var(--safe-top) + 1rem);
    padding-bottom: calc(var(--safe-bottom) + 1rem);
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 4px 0 24px rgba(131,24,67,0.1);
    display: flex; flex-direction: column;
    overflow-y: auto;
}
#sidebar.open { transform: translateX(0); }
.sidebar-backdrop {
    position: fixed; inset: 0; z-index: 55;
    background: rgba(26, 13, 18, 0.4);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
}
.sidebar-backdrop.visible { opacity: 1; pointer-events: auto; }
.sidebar-brand {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.5rem 1.5rem 1.5rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 0.75rem;
}
.sidebar-brand img { width: 44px; height: 44px; }
.sidebar-brand-text { font-family: var(--font-display); font-size: 1.375rem; color: var(--pink-900); }
.sidebar-brand-text em { font-style: italic; color: var(--pink-600); }
.sidebar-section {
    padding: 1rem 1.5rem 0.5rem;
    font-size: 0.6875rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-soft);
}
.nav-item {
    display: flex; align-items: center; gap: 0.875rem;
    padding: 0.75rem 1.5rem;
    background: transparent; border: none;
    width: 100%; text-align: left;
    font-size: 0.9375rem; font-weight: 500;
    color: var(--ink);
    transition: background 0.12s;
    border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--pink-50); }
.nav-item.active {
    background: var(--pink-50);
    border-left-color: var(--pink-600);
    color: var(--pink-900); font-weight: 600;
}
.nav-item .nav-icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
}
.nav-item .nav-count {
    margin-left: auto;
    background: var(--pink-100); color: var(--pink-800);
    font-size: 0.6875rem; font-weight: 700;
    padding: 0.125rem 0.5rem;
    border-radius: 999px;
    min-width: 22px; text-align: center;
}
.nav-item.active .nav-count { background: var(--pink-600); color: white; }
.sidebar-footer {
    margin-top: auto;
    padding: 1rem 1.5rem 0;
    border-top: 1px solid var(--line);
}
.sidebar-user {
    font-size: 0.8125rem; color: var(--ink-soft);
    margin-bottom: 0.625rem;
}
.btn-signout {
    width: 100%; padding: 0.625rem;
    background: white; color: var(--pink-700);
    border: 1px solid var(--pink-200);
    border-radius: 10px;
    font-size: 0.8125rem; font-weight: 500;
    transition: background 0.15s;
}
.btn-signout:hover { background: var(--pink-50); }

/* ========================================================================
   MAIN
   ======================================================================== */
main {
    max-width: 1400px; margin: 0 auto;
    padding: 1.5rem 1rem calc(var(--safe-bottom) + 2rem);
}
@media (min-width: 768px) { main { padding: 2rem; } }
@media (min-width: 1024px) { main { padding: 2.5rem 3rem; } }

.page-header { margin-bottom: 1.5rem; }
.page-eyebrow {
    font-family: var(--font-script);
    font-size: 1.5rem; line-height: 1;
    color: var(--pink-500);
    margin-bottom: -0.25rem;
}
.page-title {
    font-family: var(--font-display);
    font-size: clamp(1.75rem, 5vw, 2.5rem);
    font-weight: 500;
    color: var(--pink-900);
    letter-spacing: -0.02em;
    line-height: 1.1;
}
.page-title em { font-style: italic; color: var(--pink-600); }
.page-subtitle {
    color: var(--ink-soft); font-size: 0.9375rem;
    margin-top: 0.5rem;
}

/* ========================================================================
   SEARCH + GLOBAL ACTIONS
   ======================================================================== */
.toolbar {
    display: flex; align-items: center; gap: 0.625rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
}
.search-wrap {
    flex: 1; min-width: 200px;
    position: relative;
}
.search-wrap svg {
    position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--ink-soft);
    pointer-events: none;
}
.search-input {
    width: 100%; padding: 0.625rem 1rem 0.625rem 2.5rem;
    background: white;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 0.875rem;
    box-shadow: var(--shadow-sm);
}
.search-input:focus {
    outline: none;
    border-color: var(--pink-500);
    box-shadow: 0 0 0 3px rgba(236,72,153,0.12);
}

/* ========================================================================
   QUEUE SECTIONS (the card feed)
   ======================================================================== */
.queue-section { margin-bottom: 2rem; }
.queue-section:last-child { margin-bottom: 0; }
.queue-header {
    display: flex; align-items: baseline; gap: 0.625rem;
    margin-bottom: 0.875rem;
    padding-bottom: 0.625rem;
    border-bottom: 1px solid var(--line);
}
.queue-title {
    font-family: var(--font-display);
    font-size: 1.125rem; font-weight: 600;
    color: var(--pink-900);
    letter-spacing: -0.005em;
}
.queue-count {
    font-size: 0.75rem; font-weight: 600;
    color: var(--ink-soft);
    background: var(--pink-50);
    padding: 0.125rem 0.625rem;
    border-radius: 999px;
}
.queue-description {
    font-size: 0.8125rem;
    color: var(--ink-soft);
    margin-left: auto;
}
@media (max-width: 640px) { .queue-description { display: none; } }

.queue-empty {
    background: white;
    border: 1px dashed var(--line-strong);
    border-radius: 16px;
    padding: 2rem 1rem;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.875rem;
}
.queue-empty .empty-emoji { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

/* ========================================================================
   ORDER CARD
   ======================================================================== */
.cards-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.875rem;
}
@media (min-width: 640px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1100px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }

.order-card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 1.125rem 1.125rem 1rem;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    text-align: left;
    width: 100%;
    cursor: pointer;
    display: flex; flex-direction: column;
    gap: 0.75rem;
    position: relative;
    overflow: hidden;
}
.order-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: var(--pink-200);
}
.order-card:active { transform: scale(0.99); }
.order-card.urgent { border-left: 4px solid var(--pink-600); padding-left: calc(1.125rem - 3px); }
.order-card-row {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 0.625rem;
}
.order-customer {
    font-family: var(--font-display);
    font-size: 1.0625rem; font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.005em;
    line-height: 1.2;
}
.order-meta {
    font-size: 0.8125rem;
    color: var(--ink-soft);
    margin-top: 0.125rem;
}
.order-event {
    display: inline-flex; align-items: center; gap: 0.375rem;
    font-size: 0.75rem; font-weight: 500;
    color: var(--pink-700);
    background: var(--pink-50);
    padding: 0.25rem 0.625rem;
    border-radius: 999px;
}
.order-detail-line {
    display: flex; flex-wrap: wrap; gap: 0.5rem 1rem;
    font-size: 0.8125rem;
    color: var(--ink-soft);
}
.order-detail-line strong { color: var(--ink); font-weight: 600; }
.order-action-strip {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-top: auto;
    padding-top: 0.625rem;
    border-top: 1px dashed var(--line);
}
.order-status-pill {
    display: inline-flex; align-items: center; gap: 0.3125rem;
    font-size: 0.6875rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.3125rem 0.625rem;
    border-radius: 6px;
}
.pill-needs    { background: var(--warning-bg); color: var(--warning); }
.pill-sent     { background: var(--info-bg); color: var(--info); }
.pill-paid     { background: var(--success-bg); color: var(--success); }
.pill-canceled { background: #f3f4f6; color: #6b7280; }
.pill-completed{ background: var(--pink-100); color: var(--pink-800); }
.pill-due-soon { background: var(--danger-bg); color: var(--danger); }

/* ========================================================================
   BUTTONS — the action vocabulary
   ======================================================================== */
.btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.4rem;
    padding: 0.5rem 0.875rem;
    border: none; background: none;
    border-radius: 10px;
    font-size: 0.8125rem; font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
    line-height: 1.2;
    touch-action: manipulation;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
    background: var(--pink-700); color: white;
    box-shadow: 0 2px 8px -2px rgba(190, 24, 93, 0.4);
}
.btn-primary:hover { background: var(--pink-800); box-shadow: 0 4px 12px -2px rgba(190, 24, 93, 0.5); }
.btn-secondary {
    background: white; color: var(--pink-700);
    border: 1px solid var(--pink-200);
}
.btn-secondary:hover { background: var(--pink-50); border-color: var(--pink-300); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #166534; }
.btn-ghost { background: transparent; color: var(--ink-soft); }
.btn-ghost:hover { background: var(--pink-50); color: var(--pink-700); }
.btn-danger {
    background: white; color: var(--danger);
    border: 1px solid #fca5a5;
}
.btn-danger:hover { background: var(--danger-bg); }
.btn-block { width: 100%; }
.btn-sm { padding: 0.375rem 0.625rem; font-size: 0.75rem; }
.btn-lg { padding: 0.75rem 1.25rem; font-size: 0.9375rem; }
.btn .btn-icon { font-size: 1em; line-height: 1; }

/* ========================================================================
   ORDER DETAIL SHEET — slides up from bottom on mobile, modal on desktop
   ======================================================================== */
#orderSheet {
    position: fixed; inset: 0; z-index: 70;
    display: none;
}
#orderSheet.open { display: block; }
.sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(26, 13, 18, 0.5);
    backdrop-filter: blur(8px);
}
.sheet-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    max-height: 92dvh;
    background: var(--cream);
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding-bottom: var(--safe-bottom);
    box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
    animation: sheetUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes sheetUp { from { transform: translateY(20%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@media (min-width: 768px) {
    .sheet-panel {
        position: absolute;
        top: 50%; left: 50%; right: auto; bottom: auto;
        transform: translate(-50%, -50%);
        width: 95vw; max-width: 720px;
        max-height: 90vh;
        border-radius: 24px;
        animation: sheetIn 0.3s ease;
    }
    @keyframes sheetIn { from { opacity: 0; transform: translate(-50%, -48%) scale(0.96); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
}
.sheet-grabber {
    width: 36px; height: 4px;
    background: rgba(131,24,67,0.18);
    border-radius: 999px;
    margin: 0.625rem auto;
}
@media (min-width: 768px) { .sheet-grabber { display: none; } }
.sheet-header {
    position: sticky; top: 0; z-index: 5;
    background: var(--cream);
    padding: 0.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
}
.sheet-title-block { flex: 1; min-width: 0; }
.sheet-title {
    font-family: var(--font-display);
    font-size: 1.25rem; font-weight: 600;
    color: var(--pink-900);
    letter-spacing: -0.01em;
    line-height: 1.2;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sheet-subtitle {
    font-size: 0.75rem; color: var(--ink-soft);
    margin-top: 0.125rem;
}
.sheet-close {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: var(--pink-100); color: var(--pink-700);
    border: none; border-radius: 50%;
    font-size: 1.125rem;
    flex-shrink: 0;
    margin-left: 0.625rem;
}
.sheet-body { padding: 1.25rem; }

.detail-section {
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 1rem 1.125rem;
    margin-bottom: 0.875rem;
}
.detail-section h3 {
    font-family: var(--font-display);
    font-size: 0.875rem; font-weight: 600;
    color: var(--pink-900);
    letter-spacing: 0.01em;
    margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 0.5rem;
}
.detail-row {
    display: flex; flex-wrap: wrap;
    gap: 0.25rem 0.75rem;
    padding: 0.5rem 0;
    font-size: 0.875rem;
    border-bottom: 1px solid rgba(131,24,67,0.05);
}
.detail-row:last-child { border-bottom: none; }
.detail-label {
    color: var(--ink-soft);
    font-size: 0.75rem; font-weight: 500;
    min-width: 100px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.detail-value {
    color: var(--ink); flex: 1; min-width: 0;
    word-wrap: break-word;
}
.detail-value a { color: var(--pink-700); text-decoration: none; }
.detail-value a:hover { text-decoration: underline; }

/* Status switcher */
.status-switcher {
    display: flex; gap: 0.4rem;
    margin-top: 0.5rem;
    background: var(--pink-50);
    padding: 0.25rem;
    border-radius: 12px;
}
.status-switcher button {
    flex: 1; padding: 0.5rem 0.5rem;
    background: transparent; border: none;
    border-radius: 9px;
    font-size: 0.75rem; font-weight: 600;
    color: var(--ink-soft);

<script>
// ============================================================================
// REBEL RIBBON · Staff Workflow App · v4
// Card-feed UX, mobile-first, matching rebelribbon.com brand

const SUPABASE_URL='https://zyntkwammltmjjvgelwg.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bnRrd2FtbWx0bWpqdmdlbHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MzkxNjYsImV4cCI6MjA3ODExNTE2Nn0.eLkkGBuSRNUd7P7mJT5Be-dsvVjGBZ9pkupQq6KGT9A';
const SURVEY_BASE='https://rebelribbon.com/survey.html';
const sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// helpers
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const h = (tag, props={}, ...kids) => {
    const el = document.createElement(tag);
    for (const k in props) {
        if (k === 'class') el.className = props[k];
        else if (k === 'on') for (const ev in props.on) el.addEventListener(ev, props.on[ev]);
        else if (k === 'html') el.innerHTML = props[k];
        else if (k in el) el[k] = props[k];
        else el.setAttribute(k, props[k]);
    }
    for (const k of kids.flat()) if (k != null) el.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
    return el;
};
const money = n => '$' + (Number(n||0)).toFixed(2);
const dateOnly = d => { if (!d) return ''; const dt = new Date(d); return new Date(dt.getTime() - dt.getTimezoneOffset()*60000).toISOString().slice(0,10); };
const formatDate = d => { if (!d) return ''; const dt = new Date(d.includes('T')?d:d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const formatPhone = p => { if (!p) return ''; const c = (''+p).replace(/\D/g,''); const m = c.match(/^(\d{3})(\d{3})(\d{4})$/); return m ? `(${m[1]}) ${m[2]}-${m[3]}` : p; };
const initials = (e) => (e||'').split('@')[0].split(/[._-]/).map(x=>x[0]).join('').slice(0,2).toUpperCase() || 'RR';
const daysFromNow = d => { if (!d) return null; const dt = new Date(d); const diff = (dt - new Date()) / 86400000; return Math.round(diff); };
const onlyCompanyEmail = e => /@rebelribbon\.com$/i.test(e);
const escapeHtml = t => { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

// ============================================================================
// STATE
// ============================================================================
let session = null;
let currentPage = 'dashboard';
let allOrders = [];        // cache of orders loaded
let customers = new Map(); // id -> customer
let pricing = null;
let activeOrder = null;
let activeCustomer = null;
let adjustments = [];
let discountDetails = null;
let referralDetails = null;
let activeReviewTab = 'pending';

// ============================================================================
// AUTH
// ============================================================================
$('#signInBtn').onclick = async () => {
    const email = $('#email').value.trim();
    const password = $('#password').value;
    const msg = $('#authMsg');
    msg.classList.remove('visible');
    if (!onlyCompanyEmail(email)) {
        msg.textContent = 'Please use your @rebelribbon.com email.';
        msg.classList.add('visible');
        return;
    }
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
        msg.textContent = error.message;
        msg.classList.add('visible');
        return;
    }
    bootstrap();
};
$('#signOutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };

async function bootstrap() {
    const { data: { session: s } } = await sb.auth.getSession();
    if (!s) return;
    if (!onlyCompanyEmail(s.user?.email)) { await sb.auth.signOut(); return; }
    session = s;
    $('#signin').style.display = 'none';
    $('#app').classList.add('visible');
    $('#userName').textContent = s.user.email.split('@')[0];
    $('#userAvatar').textContent = initials(s.user.email);
    $('#sidebarUser').textContent = s.user.email;
    wireSidebar();
    await loadPricing();
    await goToPage('dashboard');
    loadHealth(); setInterval(loadHealth, 30000);
    wireRealtime();
}

// ============================================================================
// NAV
// ============================================================================
function wireSidebar() {
    $('#menuBtn').onclick = () => openSidebar();
    $('#sidebarBackdrop').onclick = () => closeSidebar();
    $$('.nav-item').forEach(b => b.onclick = () => { goToPage(b.dataset.page); closeSidebar(); });
}
function openSidebar() { $('#sidebar').classList.add('open'); $('#sidebarBackdrop').classList.add('visible'); }
function closeSidebar() { $('#sidebar').classList.remove('open'); $('#sidebarBackdrop').classList.remove('visible'); }

async function goToPage(page) {
    currentPage = page;
    $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
    const c = $('#content');
    c.innerHTML = '<div class="center-spinner"><div class="spinner"></div></div>';
    try {
        if (page === 'dashboard') await renderDashboard();
        else if (page === 'surveys') await renderSurveys();
        else if (page === 'reviews') await renderReviews();
        else if (page === 'pricing') await renderPricing();
        else await renderSettingsList(page);
    } catch (e) {
        console.error(e);
        c.innerHTML = `<div class="queue-empty">Error: ${escapeHtml(e.message)}</div>`;
    }
}

// ============================================================================
// DASHBOARD — the card feed
// ============================================================================
async function loadPricing() {
    const { data } = await sb.from('pricing').select('*').limit(1).maybeSingle();
    pricing = data || {};
}

async function renderDashboard() {
    // Load all orders + customers in two queries
    const { data: orders, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allOrders = orders || [];

    const customerIds = [...new Set(allOrders.map(o => o.customer_id).filter(Boolean))];
    if (customerIds.length) {
        const { data: cust } = await sb.from('customers').select('*').in('id', customerIds);
        customers.clear();
        (cust || []).forEach(c => customers.set(c.id, c));
    }

    // Bucketize
    const buckets = {
        needsAttention: [],  // active + unpaid (no link generated)
        awaitingPayment: [], // active + pending (link sent)
        inProgress: [],      // active + paid
        completed: [],
        canceled: []
    };
    for (const o of allOrders) {
        if (o.status === 'Canceled') buckets.canceled.push(o);
        else if (o.status === 'Completed') buckets.completed.push(o);
        else if (o.payment_status === 'paid') buckets.inProgress.push(o);
        else if (o.payment_status === 'pending') buckets.awaitingPayment.push(o);
        else buckets.needsAttention.push(o);
    }

    // Filter by search
    const search = ''; // we'll attach this below
    const searchFilter = q => o => {
        if (!q) return true;
        const c = customers.get(o.customer_id);
        const hay = [c?.first_name, c?.last_name, c?.email, c?.phone, o.event_type_name, String(o.cookie_amount_dzns)].join(' ').toLowerCase();
        return hay.includes(q);
    };

    const c = $('#content');
    c.innerHTML = '';

    const header = h('div', { class: 'page-header' },
        h('div', { class: 'page-eyebrow' }, 'Welcome back'),
        h('h1', { class: 'page-title', html: 'Today\'s <em>orders</em>' }),
        h('p', { class: 'page-subtitle' }, allOrders.length === 0 ? 'No orders yet — they\'ll appear here.' : `${allOrders.length} order${allOrders.length===1?'':'s'} total · ${buckets.needsAttention.length + buckets.awaitingPayment.length} need attention`)
    );
    c.appendChild(header);

    // Search bar
    const searchBar = h('div', { class: 'toolbar' },
        h('div', { class: 'search-wrap' },
            h('span', { html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>' }),
            h('input', { type: 'search', class: 'search-input', placeholder: 'Search by name, email, event…', id: 'dashSearch' })
        )
    );
    c.appendChild(searchBar);

    const sectionsHost = h('div', { id: 'sectionsHost' });
    c.appendChild(sectionsHost);

    function renderSections(q) {
        sectionsHost.innerHTML = '';
        const filt = searchFilter(q);

        renderQueueSection(sectionsHost, '🔥 Needs Attention', 'No payment link sent yet', buckets.needsAttention.filter(filt), true);
        renderQueueSection(sectionsHost, '💸 Awaiting Payment', 'Link sent, waiting for customer', buckets.awaitingPayment.filter(filt), false);
        renderQueueSection(sectionsHost, '🏭 In Progress', 'Paid · being made', buckets.inProgress.filter(filt), false);
        renderQueueSection(sectionsHost, '✅ Completed', 'Delivered or fulfilled', buckets.completed.filter(filt), false);
        if (buckets.canceled.length) renderQueueSection(sectionsHost, '❌ Canceled', '', buckets.canceled.filter(filt), false);
    }
    renderSections('');
    $('#dashSearch').oninput = (e) => renderSections(e.target.value.trim().toLowerCase());

    // Update sidebar counts
    $('#nc-dashboard').textContent = buckets.needsAttention.length + buckets.awaitingPayment.length;
    updateOtherCounts();
}

function renderQueueSection(host, title, description, orders, urgent) {
    if (!orders.length) return;
    const sec = h('section', { class: 'queue-section' });
    sec.appendChild(h('div', { class: 'queue-header' },
        h('h2', { class: 'queue-title' }, title),
        h('span', { class: 'queue-count' }, String(orders.length)),

    const card = h('button', {
        class: `order-card ${urgent || dueSoon ? 'urgent' : ''}`,
        on: { click: () => openOrderSheet(o.id) }
    });
    card.appendChild(h('div', { class: 'order-card-row' },
        h('div', null,
            h('div', { class: 'order-customer' }, name),
            h('div', { class: 'order-meta' }, `${o.cookie_amount_dzns||0} dozen · ${o.flavor || 'Flavor TBD'}`)
        ),
        o.event_type_name ? h('span', { class: 'order-event' }, o.event_type_name) : null
    ));
    card.appendChild(h('div', { class: 'order-detail-line' },
        h('span', null, `📅 `, h('strong', null, formatDate(eventDate) || 'No date')),
        days !== null && days >= 0 ? h('span', { class: dueSoon ? 'pill-due-soon order-status-pill' : '' }, dueSoon ? `${days}d away` : '') : null
    ));
    // Status row
    const statusRow = h('div', { class: 'order-action-strip' });
    if (o.status === 'Canceled') statusRow.appendChild(h('span', { class: 'order-status-pill pill-canceled' }, 'Canceled'));
    else if (o.status === 'Completed') statusRow.appendChild(h('span', { class: 'order-status-pill pill-completed' }, 'Completed'));
    else if (o.payment_status === 'paid') statusRow.appendChild(h('span', { class: 'order-status-pill pill-paid' }, 'Paid · In progress'));

async function openOrderSheet(orderId) {

    activeOrder = orderResp.data;
    adjustments = (adjResp.data || []).map(r => ({...r, amount: Number(r.amount||0)}));

function calculateTotals() {
    const o = activeOrder;
    const ppd = Number(pricing?.price_per_dozen||0);
    const dz = Number(o?.cookie_amount_dzns||0);
    const base = dz * ppd;
    const consult = o?.consultation_requested ? Number(pricing?.consultation_fee||0) : 0;
    const gift = o?.gift_note ? Number(pricing?.gift_note_fee||0) : 0;
    const feeSum = adjustments.filter(a=>a.kind==='fee').reduce((s,a)=>s+a.amount,0);
    const discSum = adjustments.filter(a=>a.kind==='discount').reduce((s,a)=>s+a.amount,0);
    const baseForCodes = base + consult + gift + feeSum;

    let codeDisc = 0, refDisc = 0;
    if (discountDetails && discountDetails.amount > 0) {
        const v = Number(discountDetails.amount);
        codeDisc = discountDetails.type === 'percent' ? baseForCodes * (v/100) : Math.min(v, baseForCodes);
    }
    if (referralDetails && referralDetails.referee_discount > 0) {
        refDisc = baseForCodes * (Number(referralDetails.referee_discount)/100);
    }
    const total = Math.max(0, base + consult + gift + feeSum - discSum - codeDisc - refDisc);
    return { ppd, dz, base, consult, gift, feeSum, discSum, codeDisc, refDisc, total };
}

function renderOrderSheet() {
    const o = activeOrder, c = activeCustomer;
    const t = calculateTotals();
    const name = c ? `${c.first_name||''} ${c.last_name||''}`.trim() : 'Order';
    $('#sheetTitle').textContent = name;
    $('#sheetSubtitle').textContent = `${o.cookie_amount_dzns||0} dozen · ${o.event_type_name||'Event'} · ${formatDate(o.pickup_delivery_date)||'No date'}`;

    body.appendChild(renderPricingSection(o, t));

    // ---- Customer
    body.appendChild(renderCustomerSection(c));

    // ---- Order details
    body.appendChild(renderOrderDetailsSection(o));

    // ---- Fees & Discounts
    body.appendChild(renderAdjustmentsSection());

    // ---- Survey
    body.appendChild(renderSurveySection(o));
}

async function generateCheckout() {
    if (!activeOrder) return;
    const t = calculateTotals();
    const lineItems = [];
    if (t.base > 0) lineItems.push({ label: `Custom Cookies (${t.dz} dozen)`, amount: t.base, quantity: 1 });
    if (t.consult > 0) lineItems.push({ label: 'Consultation', amount: t.consult, quantity: 1 });
    if (t.gift > 0) lineItems.push({ label: 'Gift Note', amount: t.gift, quantity: 1 });
    for (const a of adjustments) {
        lineItems.push({ label: a.label, amount: a.kind === 'discount' ? -Math.abs(a.amount) : a.amount, quantity: 1 });
    }
    if (t.codeDisc > 0) lineItems.push({ label: `Discount: ${activeOrder.discount_code_used}`, amount: -t.codeDisc, quantity: 1 });
    if (t.refDisc > 0) lineItems.push({ label: `Referral: ${activeOrder.referral_code_used}`, amount: -t.refDisc, quantity: 1 });

    const stripeBody = document.querySelector('.stripe-action');
    if (stripeBody) stripeBody.innerHTML = '<div class="center-spinner"><div class="spinner"></div></div>';

    try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout-session`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
            body: JSON.stringify({
                orderId: activeOrder.id,
                lineItems,
                customerEmail: activeCustomer?.email || '',
                customerName: `${activeCustomer?.first_name||''} ${activeCustomer?.last_name||''}`.trim()
            })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || `Error ${res.status}`);
        const { data: fresh } = await sb.from('orders').select('*').eq('id', activeOrder.id).single();
        activeOrder = fresh;
        renderOrderSheet();
    } catch (e) {
        alert(`Stripe error: ${e.message}\n\nIf this says "STRIPE_SECRET_KEY is not configured" — go to Supabase Dashboard → Edge Functions → Secrets and add it.`);
        renderOrderSheet();
    }
}

            slot.appendChild(h('div', { class: `survey-status ${status}` },
                used ? `✅ Completed ${tok.used_at?formatDate(tok.used_at):''}` :

async function generateSurveyToken(orderId, slot) {
    slot.innerHTML = '<div class="center-spinner"><div class="spinner"></div></div>';
    const bytes = new Uint8Array(24); crypto.getRandomValues(bytes);
    const token = btoa(String.fromCharCode(...bytes)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    const exp = new Date(); exp.setDate(exp.getDate()+30);
    const { error } = await sb.from('survey_tokens').insert({ token, order_id: orderId, expires_at: exp.toISOString() });
    if (error) { slot.innerHTML = `<div class="survey-status expired">${error.message}</div>`; return; }
    renderOrderSheet();
}

// ============================================================================
// SURVEYS PAGE
// ============================================================================
async function renderSurveys() {
    const c = $('#content');
    c.innerHTML = '';
    c.appendChild(h('div', { class: 'page-header' },
        h('div', { class: 'page-eyebrow' }, 'Customer voices'),
        h('h1', { class: 'page-title', html: 'Surveys' })
    ));
    const { data: surveys } = await sb.from('surveys').select('*').order('created_at', { ascending: false });
    if (!surveys?.length) {
        c.appendChild(h('div', { class: 'queue-empty' }, h('span', { class: 'empty-emoji' }, '📋'), 'No survey responses yet.'));
        return;
    }
    const list = h('div', { class: 'cards-grid' });
    const custIds = [...new Set(surveys.map(s=>s.customer_id).filter(Boolean))];
    let custMap = new Map();
    if (custIds.length) {
        const { data } = await sb.from('customers').select('id,first_name,last_name').in('id', custIds);
        (data||[]).forEach(x=>custMap.set(x.id,x));
    }
    for (const s of surveys) {
        const cu = custMap.get(s.customer_id);
        const card = h('div', { class: 'order-card', style: 'cursor: default;' },
            h('div', { class: 'order-card-row' },
                h('div', null,
                    h('div', { class: 'order-customer' }, cu ? `${cu.first_name||''} ${cu.last_name||''}`.trim() : 'Anonymous'),
                    h('div', { class: 'order-meta' }, formatDate(s.created_at))
                )
            ),
            h('div', { class: 'detail-row' },
                h('span', { class: 'detail-label' }, 'Cookies'),
                h('span', { class: 'review-stars' }, '★'.repeat(s.cookies_stars||0)+'☆'.repeat(5-(s.cookies_stars||0)))
            ),
            h('div', { class: 'detail-row' },
                h('span', { class: 'detail-label' }, 'Service'),
                h('span', { class: 'review-stars' }, '★'.repeat(s.service_stars||0)+'☆'.repeat(5-(s.service_stars||0)))
            ),
            s.website_review ? h('p', { class: 'review-text' }, `"${s.website_review}"`) : null
        );
        list.appendChild(card);
    }
    c.appendChild(list);
}

// ============================================================================
// REVIEWS PAGE (with moderation)
// ============================================================================
async function renderReviews() {
    const c = $('#content');
    c.innerHTML = '';
    c.appendChild(h('div', { class: 'page-header' },
        h('div', { class: 'page-eyebrow' }, 'Public testimonials'),
        h('h1', { class: 'page-title', html: 'Reviews <em>moderation</em>' }),
        h('p', { class: 'page-subtitle' }, 'Approve customer reviews before they appear on rebelribbon.com')
    ));
    const counts = await Promise.all([
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'pending'),
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'approved'),
        sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'rejected')
    ]);
    const tabsBar = h('div', { class: 'review-tabs-bar' });
    const tabs = [['pending', '🔔 Pending', counts[0].count||0], ['approved', '✅ Approved', counts[1].count||0], ['rejected', '❌ Rejected', counts[2].count||0]];
    tabs.forEach(([key,label,n]) => {
        tabsBar.appendChild(h('button', {
            class: 'review-tab-btn' + (activeReviewTab === key ? ' active' : ''),
            on: { click: () => { activeReviewTab = key; renderReviews(); } }
        }, label, h('span', { class: 'count' }, `(${n})`)));
    });
    c.appendChild(tabsBar);
    const { data: reviews } = await sb.from('website_reviews').select('*').eq('status', activeReviewTab).order('created_at', { ascending: false });
    if (!reviews?.length) {
        c.appendChild(h('div', { class: 'queue-empty' }, h('span', { class: 'empty-emoji' }, '⭐'), `No ${activeReviewTab} reviews`));
        return;
    }
    const list = h('div', null);
    for (const r of reviews) {
        const card = h('div', { class: 'review-card' });
        card.appendChild(h('div', { class: 'review-card-head' },
            h('div', null,
                h('div', { class: 'review-customer' }, escapeHtml(r.customer_name || 'Anonymous')),
                h('div', { class: 'review-stars' }, '★'.repeat(r.stars||5)+'☆'.repeat(5-(r.stars||5)))
            ),
            h('span', { class: `order-status-pill pill-${r.status==='approved'?'paid':r.status==='rejected'?'canceled':'needs'}` }, r.status)
        ));
        card.appendChild(h('p', { class: 'review-text' }, `"${escapeHtml(r.review_text)}"`));
        card.appendChild(h('div', { class: 'review-date' }, formatDate(r.created_at)));
        const actions = h('div', { class: 'review-actions-row' });
        if (activeReviewTab === 'pending') {
            actions.appendChild(h('button', { class: 'btn btn-success btn-sm', on: { click: () => updateReview(r.id, 'approved') }}, '✓ Approve'));
            actions.appendChild(h('button', { class: 'btn btn-danger btn-sm', on: { click: () => updateReview(r.id, 'rejected') }}, '✕ Reject'));
        } else if (activeReviewTab === 'approved') {
            actions.appendChild(h('button', { class: 'btn btn-secondary btn-sm', on: { click: () => { navigator.clipboard.writeText(`"${r.review_text}"\n— ${r.customer_name}`); }}}, '📋 Copy'));
            actions.appendChild(h('button', { class: 'btn btn-ghost btn-sm', on: { click: () => updateReview(r.id, 'pending') }}, 'Unpublish'));
        } else {
            actions.appendChild(h('button', { class: 'btn btn-secondary btn-sm', on: { click: () => updateReview(r.id, 'pending') }}, 'Restore'));
            actions.appendChild(h('button', { class: 'btn btn-danger btn-sm', on: { click: async () => {
                if (!confirm('Permanently delete?')) return;
                await sb.from('website_reviews').delete().eq('id', r.id); renderReviews();
            }}}, '🗑'));
        }
        card.appendChild(actions);
        list.appendChild(card);
    }
    c.appendChild(list);
}

async function updateReview(id, status) {
    const u = { status };
    if (status === 'approved') { u.approved_at = new Date().toISOString(); u.approved_by = session.user.email; }
    await sb.from('website_reviews').update(u).eq('id', id);
    renderReviews();
}

async function renderSettingsList(key) {
    const cfg = SETTINGS_CONFIG[key];
    if (!cfg) return;
    const c = $('#content');
    c.innerHTML = '';
    const header = h('div', { class: 'page-header' });
    header.appendChild(h('div', { class: 'page-eyebrow' }, cfg.eyebrow));
    header.appendChild(h('h1', { class: 'page-title' }, cfg.title));
    c.appendChild(header);

    const toolbar = h('div', { class: 'toolbar' },
        h('button', { class: 'btn btn-primary', on: { click: () => openEditor(cfg, null) }}, '+ Add new')
    );
    c.appendChild(toolbar);

    const { data: rows } = await sb.from(cfg.table).select('*').order('created_at', { ascending: false });
    if (!rows?.length) {
        c.appendChild(h('div', { class: 'queue-empty' }, h('span', { class: 'empty-emoji' }, cfg.emoji), 'Nothing yet.'));
        return;
    }
    const list = h('div', { class: 'settings-list' });
    for (const r of rows) {
        const row = h('div', { class: 'settings-row' });
        row.appendChild(h('div', { class: 'settings-row-main' }, h('div', { class: 'settings-row-label', html: cfg.renderRow(r) })));
        row.appendChild(h('div', { class: 'settings-row-actions' },
            h('button', { class: 'btn btn-secondary btn-sm', on: { click: () => openEditor(cfg, r) }}, 'Edit')
        ));
        list.appendChild(row);
    }
    c.appendChild(list);
}

// ============================================================================
// EDITOR DIALOG
// ============================================================================
$('#editorClose').onclick = () => $('#editor').classList.remove('open');
$('#editorCancel').onclick = () => $('#editor').classList.remove('open');
async function openEditor(cfg, row) {
    $('#editorTitle').textContent = row ? `Edit ${cfg.title}` : `New ${cfg.title}`;
    const body = $('#editorBody');
    body.innerHTML = '';
    for (const f of cfg.fields) {
        const wrap = h('div', { class: 'field' });
        wrap.appendChild(h('label', { for: `fld_${f.key}` }, f.label));
        let input;
        if (f.type === 'textarea') input = h('textarea', { id: `fld_${f.key}`, rows: 3 });
        else if (f.type === 'select') {
            input = h('select', { id: `fld_${f.key}` });
            for (const o of f.options) input.appendChild(h('option', { value: o }, o));
        } else if (f.type === 'customer') {
            input = h('select', { id: `fld_${f.key}` });
            input.appendChild(h('option', { value: '' }, '— Select customer —'));
            const { data } = await sb.from('customers').select('id,first_name,last_name').limit(1000);
            (data||[]).forEach(c => input.appendChild(h('option', { value: c.id }, `${c.first_name} ${c.last_name}`)));
        } else {
            input = h('input', { id: `fld_${f.key}`, type: f.type, step: f.step });
        }
        if (row && row[f.key] != null) {
            if (f.type === 'date') input.value = dateOnly(row[f.key]);
            else input.value = row[f.key];
        }
        wrap.appendChild(input);
        body.appendChild(wrap);
    }
    $('#editorDelete').classList.toggle('hidden', !row || cfg.table === 'pricing');
    $('#editorDelete').onclick = async () => {
        if (!confirm('Delete?')) return;
        await sb.from(cfg.table).delete().eq('id', row.id);
        $('#editor').classList.remove('open');
        goToPage(currentPage);
    };
    $('#editorSave').onclick = async () => {
        const payload = {};
        for (const f of cfg.fields) {
            const el = document.getElementById(`fld_${f.key}`);
            let v = el.value;
            if (f.transform) v = f.transform(v);
            if (v === '' || v === null) v = null;
            else if (f.type === 'number' && v !== null) v = Number(v);
            payload[f.key] = v;
        }
        const result = row && row.id
            ? await sb.from(cfg.table).update(payload).eq('id', row.id).select('*').single()
            : await sb.from(cfg.table).insert(payload).select('*').single();
        if (result.error) return alert(result.error.message);
        $('#editor').classList.remove('open');
        goToPage(currentPage);
    };
    $('#editor').classList.add('open');
}

// ============================================================================
// HEALTH BANNER + REALTIME + COUNTS
// ============================================================================
async function loadHealth() {
    try {
        const { data } = await sb.from('system_status').select('*').limit(1).maybeSingle();
        const banner = $('#health-banner');
        if (!data || !data.last_webhook_received_at) {
            banner.classList.remove('visible'); return;
        }
        const hours = (Date.now() - new Date(data.last_webhook_received_at).getTime()) / 3600000;
        if (hours < 24) { banner.classList.remove('visible', 'red'); return; }
        banner.classList.add('visible');
        if (hours >= 72) { banner.classList.add('red'); $('#healthText').textContent = `Stripe webhook down — ${Math.round(hours)}h since last event`; }
        else { banner.classList.remove('red'); $('#healthText').textContent = `Stripe webhook delayed — ${Math.round(hours)}h since last event`; }
    } catch {}
}

async function updateOtherCounts() {
    try {
        const [su, rev] = await Promise.all([
            sb.from('surveys').select('id', { count: 'exact', head: true }),
            sb.from('website_reviews').select('id', { count: 'exact', head: true }).eq('status', 'pending')
        ]);
        $('#nc-surveys').textContent = su.count || 0;
        $('#nc-reviews').textContent = rev.count || 0;
    } catch {}
}

function wireRealtime() {
    sb.channel('orders-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
        if (currentPage === 'dashboard') renderDashboard();
    }).subscribe();
    sb.channel('reviews-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'website_reviews' }, () => {
        if (currentPage === 'reviews') renderReviews();
        updateOtherCounts();
    }).subscribe();
}
